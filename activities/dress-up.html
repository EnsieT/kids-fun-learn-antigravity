<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Festival Dress-Up 👗 · Kids Fun Learn</title>
<link rel="stylesheet" href="../css/style.css"/>
<style>
  #game-area { padding-bottom: 32px; }

  .prompt-bar {
    text-align: center;
    font-size: clamp(1rem, 3vw, 1.3rem);
    font-weight: 800;
    color: #9C27B0;
    padding: 6px 16px;
  }

  /* Character selector */
  .selector-row {
    display: flex;
    justify-content: center;
    gap: 12px;
    padding: 8px 16px;
    flex-wrap: wrap;
  }
  .selector-btn {
    background: #fff;
    border: 3px solid #ccc;
    border-radius: 50px;
    padding: 8px 20px;
    font-size: 1.3rem;
    font-weight: 800;
    cursor: pointer;
    transition: transform .15s, border-color .15s, background .15s;
    min-height: 52px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font);
  }
  .selector-btn:hover  { transform: scale(1.06); }
  .selector-btn:active { transform: scale(0.96); }
  .selector-btn.active { border-color: #9C27B0; background: #F3E5F5; }

  .festival-btn.active { border-color: #FF8C00; background: #FFF3E0; }

  /* Character stage */
  .stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 180px;
    margin: 8px 16px;
    background: linear-gradient(135deg, #F3E5F5, #E1BEE7);
    border-radius: 24px;
    border: 3px solid #CE93D8;
    position: relative;
    overflow: hidden;
    padding: 16px;
  }
  .stage-character {
    font-size: 5rem;
    line-height: 1;
    transition: transform .3s;
    display: block;
    text-align: center;
  }
  .stage-character.show-off { animation: showOff .8s ease; }
  @keyframes showOff {
    0%   { transform: scale(1) rotate(0deg); }
    20%  { transform: scale(1.3) rotate(-10deg); }
    40%  { transform: scale(1.3) rotate(10deg); }
    60%  { transform: scale(1.2) rotate(-6deg); }
    80%  { transform: scale(1.2) rotate(6deg); }
    100% { transform: scale(1) rotate(0deg); }
  }
  .equipped-items {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    margin-top: 10px;
    max-width: 320px;
  }
  .equipped-badge {
    background: rgba(255,255,255,.85);
    border-radius: 50px;
    padding: 4px 12px;
    font-size: 1.3rem;
    box-shadow: 0 2px 8px rgba(0,0,0,.15);
    display: flex;
    align-items: center;
    gap: 4px;
    animation: fadeIn .3s ease;
  }
  .equipped-badge span { font-size: .8rem; font-weight: 800; color: #555; }

  /* Clothing rack */
  .rack-label {
    text-align: center;
    font-size: 1rem;
    font-weight: 900;
    color: #9C27B0;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin: 8px 0 4px;
  }
  .rack-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    padding: 8px 16px;
    max-width: 640px;
    margin: 0 auto;
  }
  .rack-item {
    background: #fff;
    border-radius: 18px;
    box-shadow: 0 4px 12px rgba(0,0,0,.1);
    border: 3px solid #e0e0e0;
    padding: 10px 12px;
    cursor: pointer;
    text-align: center;
    transition: transform .15s, border-color .15s, background .15s;
    min-width: 80px;
    min-height: 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    user-select: none;
  }
  .rack-item:hover  { transform: scale(1.1); box-shadow: 0 6px 20px rgba(0,0,0,.18); }
  .rack-item:active { transform: scale(0.93); }
  .rack-item.equipped { border-color: #9C27B0; background: #F3E5F5; box-shadow: 0 4px 16px rgba(156,39,176,.25); }
  .rack-item .r-emoji { font-size: 2.2rem; line-height: 1; }
  .rack-item .r-name  { font-size: .78rem; font-weight: 800; color: #555; }
  .rack-item .equipped-tick { font-size: .7rem; color: #9C27B0; font-weight: 900; }

  /* Show Off button */
  .showoff-row {
    display: flex;
    justify-content: center;
    margin: 14px 16px 4px;
  }
  .showoff-btn {
    background: linear-gradient(135deg, #9C27B0, #6A1B9A);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 14px 36px;
    font-size: 1.4rem;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(156,39,176,.4);
    transition: transform .2s, box-shadow .2s;
    min-height: 56px;
    font-family: var(--font);
  }
  .showoff-btn:hover  { transform: scale(1.07); box-shadow: 0 8px 28px rgba(156,39,176,.5); }
  .showoff-btn:active { transform: scale(0.97); }

  @media (max-width: 480px) {
    .stage-character { font-size: 4rem; }
    .rack-item { min-width: 68px; min-height: 68px; }
    .rack-item .r-emoji { font-size: 1.9rem; }
  }
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>

<header class="activity-header">
  <button class="back-btn" onclick="goHome()" aria-label="Go Home">🏠</button>
  <h1 id="page-title">👗 Festival Dress-Up</h1>
</header>

<div id="langSelector" class="language-selector">
  <button class="lang-btn" data-lang="en">🇬🇧 En</button>
  <button class="lang-btn" data-lang="hi">🇮🇳 हि</button>
  <button class="lang-btn" data-lang="gu">🇮🇳 ગુ</button>
</div>

<div id="game-area">
  <div class="prompt-bar" id="prompt-bar">Dress up for the festival!</div>

  <!-- Character selector -->
  <div class="selector-row" id="character-selector">
    <button class="selector-btn active" data-char="boy" onclick="selectChar('boy')">👦 <span id="boy-label">Boy</span></button>
    <button class="selector-btn" data-char="girl" onclick="selectChar('girl')">👧 <span id="girl-label">Girl</span></button>
  </div>

  <!-- Festival selector -->
  <div class="selector-row" id="festival-selector">
    <button class="selector-btn festival-btn active" data-festival="diwali" onclick="selectFestival('diwali')">🪔 <span class="fest-label" data-key="diwali"></span></button>
    <button class="selector-btn festival-btn" data-festival="holi"    onclick="selectFestival('holi')">🎨 <span class="fest-label" data-key="holi"></span></button>
    <button class="selector-btn festival-btn" data-festival="eid"     onclick="selectFestival('eid')">🌙 <span class="fest-label" data-key="eid"></span></button>
    <button class="selector-btn festival-btn" data-festival="navratri" onclick="selectFestival('navratri')">💃 <span class="fest-label" data-key="navratri"></span></button>
    <button class="selector-btn festival-btn" data-festival="newyear" onclick="selectFestival('newyear')">🎆 <span class="fest-label" data-key="newyear"></span></button>
  </div>

  <!-- Stage -->
  <div class="stage">
    <span class="stage-character" id="stage-char">👦</span>
    <div class="equipped-items" id="equipped-items"></div>
  </div>

  <!-- Clothing Rack -->
  <div class="rack-label" id="rack-label">👗 Clothing Rack</div>
  <div class="rack-grid" id="rack-grid"></div>

  <!-- Show Off -->
  <div class="showoff-row">
    <button class="showoff-btn" id="showoff-btn" onclick="showOff()">✨ <span id="showoff-label">Show Off!</span></button>
  </div>
</div>

<script src="../js/common.js"></script>
<script>
const FESTIVALS = {
  diwali:   {en:'Diwali',   hi:'दिवाली',  gu:'દિવાળી'},
  holi:     {en:'Holi',     hi:'होली',    gu:'હોળી'},
  eid:      {en:'Eid',      hi:'ईद',      gu:'ઈદ'},
  navratri: {en:'Navratri', hi:'नवरात्रि', gu:'નવરાત્રી'},
  newyear:  {en:'New Year', hi:'नया साल', gu:'નવું વર્ષ'},
};

const FESTIVAL_ITEMS = {
  diwali: [
    {key:'diya',    emoji:'🪔', en:'Diya',       hi:'दिया',       gu:'દીવો'},
    {key:'sparkler',emoji:'🎆', en:'Sparkler',   hi:'फुलझड़ी',    gu:'ફટાકડો'},
    {key:'kurta_s', emoji:'👘', en:'Silk Kurta', hi:'रेशमी कुर्ता',gu:'રેશમી કુર્તો'},
    {key:'jewel',   emoji:'💫', en:'Jewellery',  hi:'गहने',       gu:'ઘરેણા'},
    {key:'garland', emoji:'🌺', en:'Garland',    hi:'माला',       gu:'માળા'},
  ],
  holi: [
    {key:'colors',  emoji:'🎨', en:'Colors',     hi:'रंग',        gu:'રંગ'},
    {key:'kurta_w', emoji:'👕', en:'White Kurta',hi:'सफेद कुर्ता',gu:'સફેદ કુર્તો'},
    {key:'pichkari',emoji:'🌈', en:'Pichkari',   hi:'पिचकारी',   gu:'પિચકારી'},
    {key:'flower',  emoji:'🪷', en:'Flower',     hi:'फूल',        gu:'ફૂલ'},
  ],
  eid: [
    {key:'starmoon',emoji:'☪️', en:'Star & Moon',hi:'चाँद तारा',  gu:'ચાંદ તારો'},
    {key:'kurta_e', emoji:'🤍', en:'White Kurta',hi:'सफेद कुर्ता',gu:'સફેદ કુર્તો'},
    {key:'gift',    emoji:'🎁', en:'Gift',       hi:'तोहफा',      gu:'ભેટ'},
    {key:'bangle',  emoji:'🧿', en:'Bangle',     hi:'चूड़ी',      gu:'ચૂડી'},
  ],
  navratri: [
    {key:'horse',   emoji:'🏇', en:'Horse',       hi:'घोड़ा',     gu:'ઘોડો'},
    {key:'chaniya', emoji:'👗', en:'Chaniya Choli',hi:'चनिया चोली',gu:'ચણિયા ચોળી'},
    {key:'dandiya', emoji:'💃', en:'Dandiya',     hi:'डांडिया',   gu:'ડાંડિયા'},
    {key:'flowers', emoji:'🌸', en:'Flowers',     hi:'फूल',       gu:'ફૂલ'},
  ],
  newyear: [
    {key:'partyhat',emoji:'🎉', en:'Party Hat',  hi:'पार्टी टोपी',gu:'પાર્ટી ટોપી'},
    {key:'firework',emoji:'🎆', en:'Fireworks',  hi:'आतिशबाजी',  gu:'આતશબાજી'},
    {key:'confettis',emoji:'🎊',en:'Confetti',   hi:'कागज के टुकड़े',gu:'કોન્ફેટ્ટી'},
    {key:'star_ny', emoji:'🌟', en:'Star',       hi:'तारा',       gu:'તારો'},
  ],
};

let currentChar = 'boy';
let currentFestival = 'diwali';
let equipped = new Set();

function selectChar(c) {
  currentChar = c;
  document.querySelectorAll('#character-selector .selector-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.char === c);
  });
  updateStage();
  speak({en: c === 'boy' ? 'Boy!' : 'Girl!', hi: c === 'boy' ? 'लड़का!' : 'लड़की!', gu: c === 'boy' ? 'છોકરો!' : 'છોકરી!'});
}

function selectFestival(f) {
  currentFestival = f;
  equipped = new Set();
  document.querySelectorAll('#festival-selector .selector-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.festival === f);
  });
  updateStage();
  renderRack();
  speak(FESTIVALS[f]);
}

function updateStage() {
  document.getElementById('stage-char').textContent = currentChar === 'boy' ? '👦' : '👧';
  renderEquipped();
}

function renderEquipped() {
  const container = document.getElementById('equipped-items');
  container.innerHTML = '';
  const items = FESTIVAL_ITEMS[currentFestival] || [];
  items.forEach(item => {
    if (equipped.has(item.key)) {
      const badge = document.createElement('div');
      badge.className = 'equipped-badge';
      badge.innerHTML = `${item.emoji} <span>${t(item)}</span>`;
      container.appendChild(badge);
    }
  });
}

function renderRack() {
  const grid = document.getElementById('rack-grid');
  grid.innerHTML = '';
  const items = FESTIVAL_ITEMS[currentFestival] || [];
  items.forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'rack-item' + (equipped.has(item.key) ? ' equipped' : '');
    btn.setAttribute('aria-label', item.en);
    btn.innerHTML = `
      <span class="r-emoji">${item.emoji}</span>
      <span class="r-name">${t(item)}</span>
      ${equipped.has(item.key) ? '<span class="equipped-tick">✓ On</span>' : ''}
    `;
    btn.onclick = () => toggleItem(item, btn);
    grid.appendChild(btn);
  });
}

function toggleItem(item, btn) {
  if (equipped.has(item.key)) {
    equipped.delete(item.key);
    btn.classList.remove('equipped');
  } else {
    equipped.add(item.key);
    btn.classList.add('equipped');
    speak({en: item.en, hi: item.hi, gu: item.gu});
  }
  renderEquipped();
  // Refresh rack to update tick labels
  renderRack();
}

function showOff() {
  const charEl = document.getElementById('stage-char');
  charEl.classList.remove('show-off');
  void charEl.offsetWidth;
  charEl.classList.add('show-off');
  setTimeout(() => charEl.classList.remove('show-off'), 900);
  launchConfetti();
  speak({en:'Looking amazing! You look wonderful!', hi:'वाह! तुम बहुत सुंदर लग रहे हो!', gu:'વાહ! તું ખૂબ સરસ લાગે છે!'});
}

function onLanguageChange() { renderAll(); }

function renderAll() {
  document.getElementById('page-title').textContent = t({en:'👗 Festival Dress-Up', hi:'👗 त्योहार का पहनावा', gu:'👗 તહેવારની પોશાક'});
  document.getElementById('prompt-bar').textContent = t({en:'Dress up for the festival!', hi:'त्योहार के लिए तैयार हो जाओ!', gu:'તહેવાર માટે તૈયાર થાવ!'});
  document.getElementById('boy-label').textContent = t({en:'Boy', hi:'लड़का', gu:'છોકરો'});
  document.getElementById('girl-label').textContent = t({en:'Girl', hi:'लड़की', gu:'છોકરી'});
  document.getElementById('rack-label').textContent = t({en:'👗 Clothing Rack — tap to wear!', hi:'👗 कपड़े — पहनने के लिए दबाओ!', gu:'👗 કપડાં — પહેરવા ટૅપ કરો!'});
  document.getElementById('showoff-label').textContent = t({en:'Show Off!', hi:'दिखावा करो!', gu:'બતાવો!'});

  // Festival label buttons
  document.querySelectorAll('.fest-label').forEach(el => {
    const key = el.dataset.key;
    if (FESTIVALS[key]) el.textContent = t(FESTIVALS[key]);
  });

  renderRack();
  renderEquipped();
}

document.addEventListener('DOMContentLoaded', () => {
  initLanguageSelector();
  renderAll();
  speak({en:'Dress up for the festival!', hi:'त्योहार के लिए तैयार हो जाओ!', gu:'તહેવાર માટે તૈયાર થાવ!'});
});
</script>
</body>
</html>
