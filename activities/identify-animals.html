<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Animal Fun 🐘 · Kids Fun Learn</title>
<link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<canvas id="confetti-canvas"></canvas>

<header class="activity-header">
  <button class="back-btn" onclick="goHome()" aria-label="Go Home">🏠</button>
  <h1>🐘 Animal Fun</h1>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill"></div></div>
  <span class="score-display" id="score-display">0/10</span>
</header>

<div id="game-area">
  <div class="question-area">
    <p class="question-text" id="question-text">Tap the correct animal!</p>
  </div>

  <div id="feedback-banner" class="feedback-banner"></div>

  <div class="emoji-grid" id="emoji-grid"></div>
</div>

<div id="completion-screen" class="completion-screen">
  <div class="completion-stars" id="completion-stars"></div>
  <div class="completion-title" id="completion-title"></div>
  <div class="completion-score" id="completion-score"></div>
  <div class="completion-best"  id="completion-best"></div>
  <button class="play-again-btn" onclick="initGame()">🔄 Play Again</button>
</div>

<script src="../js/common.js"></script>
<script>
const ANIMALS = [
  {emoji:'🐄', en:'Cow',      hi:'गाय'},
  {emoji:'🦚', en:'Peacock',  hi:'मोर'},
  {emoji:'🐘', en:'Elephant', hi:'हाथी'},
  {emoji:'🦜', en:'Parrot',   hi:'तोता'},
  {emoji:'🐯', en:'Tiger',    hi:'बाघ'},
  {emoji:'🐒', en:'Monkey',   hi:'बंदर'},
  {emoji:'🦁', en:'Lion',     hi:'शेर'},
  {emoji:'🐕', en:'Dog',      hi:'कुत्ता'},
  {emoji:'🐈', en:'Cat',      hi:'बिल्ली'},
  {emoji:'🐪', en:'Camel',    hi:'ऊँट'},
  {emoji:'🐊', en:'Crocodile',hi:'मगरमच्छ'},
  {emoji:'🦋', en:'Butterfly',hi:'तितली'},
];

const TOTAL_ROUNDS = 10;
let round = 0, mistakes = 0, answered = false, correctAnimal = null;

function initGame() {
  round = 0; mistakes = 0; answered = false;
  document.getElementById('completion-screen').classList.remove('show');
  document.getElementById('game-area').classList.remove('hidden');
  hideFeedback();
  nextRound();
}

function nextRound() {
  if (round >= TOTAL_ROUNDS) { showCompletion('identify-animals', mistakes, TOTAL_ROUNDS); return; }
  answered = false;
  hideFeedback();
  updateProgress(round, TOTAL_ROUNDS);

  const pool = shuffle(ANIMALS).slice(0, 6);
  correctAnimal = pool[Math.floor(Math.random() * pool.length)];
  document.getElementById('question-text').innerHTML =
    `Tap the <strong>${correctAnimal.hi} (${correctAnimal.en})</strong>! 👆`;

  const grid = document.getElementById('emoji-grid');
  grid.innerHTML = '';
  pool.forEach(animal => {
    const div = document.createElement('div');
    div.className = 'emoji-item';
    div.innerHTML = `<span class="item-emoji">${animal.emoji}</span>
                     <span class="item-label">${animal.hi}<br/>${animal.en}</span>`;
    div.onclick = () => handleTap(div, animal);
    grid.appendChild(div);
  });
}

function handleTap(el, animal) {
  if (answered) return;
  if (animal.emoji === correctAnimal.emoji) {
    answered = true;
    el.classList.add('correct');
    showFeedback(true);
    round++;
    setTimeout(() => { el.classList.remove('correct'); nextRound(); }, 1500);
  } else {
    mistakes++;
    el.classList.add('wrong');
    showFeedback(false);
    setTimeout(() => el.classList.remove('wrong'), 600);
  }
}

document.addEventListener('DOMContentLoaded', initGame);
</script>
</body>
</html>
