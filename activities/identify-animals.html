<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Identify Animals 🎮 Kids Fun Learn</title>
<meta name="description" content="Identify different animals by their emoji pictures. A fun wildlife recognition game for children aged 4-6."/>
<meta property="og:title" content="Animal Fun 🎮 Kids Fun Learn"/>
<meta property="og:description" content="Identify different animals by their emoji pictures. A fun wildlife recognition game for children aged 4-6."/>
<meta property="og:type" content="website"/>
<link rel="stylesheet" href="../css/style.css"/>
<meta name="theme-color" content="#FFD700"/>
</head>
<body>
<canvas id="confetti-canvas" aria-hidden="true"></canvas>

<header class="activity-header">
  <button class="back-btn" onclick="goHome()" aria-label="Go Home" aria-label="Go Home">🏠</button>
  <h1>🐘 Animal Fun</h1>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill"></div></div>
  <span class="score-display" id="score-display">0/5</span>
</header>

<div id="langSelector" class="language-selector">
  <button class="lang-btn" data-lang="en">🇬🇧 En</button>
  <button class="lang-btn" data-lang="hi">🇮🇳 हि</button>
  <button class="lang-btn" data-lang="gu">🇮🇳 ગુ</button>
</div>

<div id="game-area">
  <div class="question-area">
    <p class="question-text" id="question-text">Tap the correct animal!</p>
    <button class="hear-btn" onclick="hearAgain()" aria-label="आवाज़ सुनो">🔊</button>
  </div>

  <div id="feedback-banner" class="feedback-banner"></div>

  <div class="emoji-grid" id="emoji-grid"></div>
</div>

<div id="completion-screen" class="completion-screen">
  <div class="completion-stars" id="completion-stars"></div>
  <div class="completion-title" id="completion-title"></div>
  <div class="completion-score" id="completion-score"></div>
  <div class="completion-best"  id="completion-best"></div>
  <button class="play-again-btn" onclick="initGame()">🔄 Play Again</button>
</div>

<script src="../js/common.js"></script>
<script>
const ANIMALS = [
  {emoji:'🐄', en:'Cow',      hi:'गाय',       gu:'ગાય'},
  {emoji:'🦚', en:'Peacock',  hi:'मोर',       gu:'મોર'},
  {emoji:'🐘', en:'Elephant', hi:'हाथी',      gu:'હાથી'},
  {emoji:'🦜', en:'Parrot',   hi:'तोता',      gu:'પોપટ'},
  {emoji:'🐯', en:'Tiger',    hi:'बाघ',       gu:'વાઘ'},
  {emoji:'🐒', en:'Monkey',   hi:'बंदर',      gu:'વાંદરો'},
  {emoji:'🦁', en:'Lion',     hi:'शेर',       gu:'સિંહ'},
  {emoji:'🐕', en:'Dog',      hi:'कुत्ता',    gu:'કૂતરો'},
  {emoji:'🐈', en:'Cat',      hi:'बिल्ली',    gu:'બિલાડી'},
  {emoji:'🐪', en:'Camel',    hi:'ऊँट',       gu:'ઊંટ'},
  {emoji:'🐊', en:'Crocodile',hi:'मगरमच्छ',   gu:'મગર'},
  {emoji:'🦋', en:'Butterfly',hi:'तितली',     gu:'પતંગિયું'},
  {emoji:'🐎', en:'Horse',     hi:'घोड़ा',      gu:'ઘોડો'},
  {emoji:'🐢', en:'Turtle',    hi:'कछुआ',      gu:'કાચબો'},
  {emoji:'🦉', en:'Owl',       hi:'उल्लू',      gu:'ઘુવડ'},
  {emoji:'🦊', en:'Fox',       hi:'लोमड़ी',     gu:'શિયાળ'},
  {emoji:'🦓', en:'Zebra',     hi:'जेब्रा',      gu:'ઝેબ્રા'},
  {emoji:'🦒', en:'Giraffe',   hi:'जिराफ़',     gu:'જિરાફ'},
  {emoji:'🦏', en:'Rhino',     hi:'गेंडा',      gu:'ગેંડો'},
  {emoji:'🦥', en:'Sloth',     hi:'स्लोथ',      gu:'સ્લોથ'},
  {emoji:'🦌', en:'Deer',      hi:'हिरण',      gu:'હરણ'},
  {emoji:'🦩', en:'Flamingo',  hi:'राजहंस',     gu:'રાજહંસ'},
];

const TOTAL_ROUNDS = 5;
let round = 0, mistakes = 0, answered = false, correctAnimal = null;
let currentPrompt = {};

function hearAgain() { speak(currentPrompt); }

function onLanguageChange() { initGame(); }

function initGame() {
  round = 0; mistakes = 0; answered = false;
  document.getElementById('completion-screen').classList.remove('show');
  document.getElementById('game-area').classList.remove('hidden');
  hideFeedback();
  nextRound();
}

function nextRound() {
  if (round >= TOTAL_ROUNDS) { showCompletion('identify-animals', mistakes, TOTAL_ROUNDS); return; }
  answered = false;
  hideFeedback();
  updateProgress(round, TOTAL_ROUNDS);

  const pool = shuffle(ANIMALS).slice(0, 6);
  correctAnimal = pool[Math.floor(Math.random() * pool.length)];
  document.getElementById('question-text').innerHTML =
    `${t({en:'Tap the', hi:'छुओ', gu:'ટચ કરો'})} <strong>${t(correctAnimal)}</strong>! 👆`;

  currentPrompt = {en: `Tap the ${correctAnimal.en}!`, hi: correctAnimal.hi + ' को छुओ!', gu: correctAnimal.gu + ' ને ટચ કરો!'};
  speak(currentPrompt);

  const grid = document.getElementById('emoji-grid');
  grid.innerHTML = '';
  pool.forEach(animal => {
    const div = document.createElement('div');
    div.className = 'emoji-item';
    div.innerHTML = `<span class="item-emoji">${animal.emoji}</span>
                     <span class="item-label">${t(animal)}</span>`;
    div.onclick = () => handleTap(div, animal);
    grid.appendChild(div);
  });
}

function handleTap(el, animal) {
  if (answered) return;
  if (animal.emoji === correctAnimal.emoji) {
    answered = true;
    el.classList.add('correct');
    showFeedback(true);
    round++;
    setTimeout(() => { el.classList.remove('correct'); nextRound(); }, 1500);
  } else {
    mistakes++;
    el.classList.add('wrong');
    showFeedback(false);
    setTimeout(() => el.classList.remove('wrong'), 600);
  }
}

document.addEventListener('DOMContentLoaded', () => { initLanguageSelector(); initGame(); });
</script>
</body>
</html>
