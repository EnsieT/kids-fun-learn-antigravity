<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Catch It! 🧺 · Kids Fun Learn</title>
<link rel="stylesheet" href="../css/style.css"/>
<style>
  #game-area { position:relative; overflow:hidden; min-height:60vh; border-radius:16px; background:#e8f5e9; touch-action:none; }
  #basket { position:absolute; bottom:10px; width:80px; height:80px; font-size:3.5rem; display:flex; justify-content:center; align-items:center; user-select:none; z-index:10; }
  .falling-item { position:absolute; top:-50px; width:50px; height:50px; font-size:2.5rem; display:flex; justify-content:center; align-items:center; user-select:none; }
  #status-bar { display:flex; justify-content:space-between; padding:10px 20px; font-weight:bold; font-size:1.2rem; background:rgba(255,255,255,0.7); }
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>

<header class="activity-header">
  <button class="back-btn" onclick="goHome()" aria-label="Go Home">🏠</button>
  <h1>🧺 Catch It!</h1>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill"></div></div>
  <span class="score-display" id="score-display">0/3</span>
</header>

<div id="langSelector" class="language-selector">
  <button class="lang-btn" data-lang="en">🇬🇧 En</button>
  <button class="lang-btn" data-lang="hi">🇮🇳 हि</button>
  <button class="lang-btn" data-lang="gu">🇮🇳 ગુ</button>
</div>

<div class="question-area" style="margin-bottom:8px;">
  <p class="question-text" id="question-text">Catch 10 fruits!</p>
  <button class="hear-btn" onclick="hearAgain()" aria-label="आवाज़ सुनो">🔊</button>
</div>

<div id="game-area">
  <div id="status-bar">
    <span id="target-ui">Caught: 0/10</span>
  </div>
  <div id="basket">🧺</div>
  <div id="feedback-banner" class="feedback-banner"></div>
</div>

<div id="completion-screen" class="completion-screen">
  <div class="completion-stars" id="completion-stars">⭐⭐⭐</div>
  <div class="completion-title" id="completion-title"></div>
  <div class="completion-score" id="completion-score"></div>
  <div class="completion-best"  id="completion-best"></div>
  <button class="play-again-btn" onclick="initGame()">🔄 Play Again</button>
</div>

<script src="../js/common.js"></script>
<script>
const GOOD_ITEMS = ['🍎','🍌','🍇','🍓','🍉','🥭','🍊','🍍'];
const BAD_ITEMS = ['🕷️','🐛','🦂','💣'];

const TOTAL_ROUNDS = 3; 
const TARGET_CATCH = 10;
let round = 0, mistakes = 0;
let caught = 0;
let currentPrompt = {};
let gameInterval, spawnInterval;
let items = [];
let basketX = 0;

function hearAgain() { speak(currentPrompt); }
function onLanguageChange() { updateText(); }

function initGame() {
  round = 0; mistakes = 0;
  basketX = document.getElementById('game-area').offsetWidth/2 - 40;
  document.getElementById('basket').style.left = basketX + 'px';
  document.getElementById('completion-screen').classList.remove('show');
  hideFeedback();
  nextRound();
}

function updateText() {
  document.getElementById('question-text').textContent = t({
    en:`Catch ${TARGET_CATCH} fruits, avoid bugs!`,
    hi:`${TARGET_CATCH} फल पकड़ो, कीड़ों से बचो!`,
    gu:`${TARGET_CATCH} ફળ પકડો, જીવડાંથી બચો!`
  });
  document.getElementById('target-ui').textContent = t({
    en:`Caught: ${caught}/${TARGET_CATCH}`,
    hi:`पकड़े: ${caught}/${TARGET_CATCH}`,
    gu:`પકડ્યા: ${caught}/${TARGET_CATCH}`
  });
}

function nextRound() {
  if(round >= TOTAL_ROUNDS) {
    endGame();
    showCompletion('catch-it', mistakes, TOTAL_ROUNDS*TARGET_CATCH);
    return;
  }
  caught = 0;
  updateText();
  
  updateProgress(round, TOTAL_ROUNDS);
  document.getElementById('score-display').textContent = `${round}/${TOTAL_ROUNDS}`;
  
  currentPrompt = {
    en:`Catch the fruits! Don't catch the bugs!`,
    hi:`फल पकड़ो! कीड़ों को मत पकड़ो!`,
    gu:`ફળ પકડો! જીવડાં ન પકડો!`
  };
  speak(currentPrompt);
  startGameLoop();
}

// Controls
const gameArea = document.getElementById('game-area');
const basket = document.getElementById('basket');

function moveBasket(evt) {
  let cx = evt.touches ? evt.touches[0].clientX : evt.clientX;
  let rect = gameArea.getBoundingClientRect();
  let nx = cx - rect.left - 40; // 40 is half basket width
  basketX = Math.max(0, Math.min(gameArea.offsetWidth - 80, nx));
  basket.style.left = basketX + 'px';
}
gameArea.addEventListener('mousemove', moveBasket);
gameArea.addEventListener('touchmove', (e)=>{e.preventDefault(); moveBasket(e);}, {passive:false});

function startGameLoop() {
  endGame(); 
  spawnInterval = setInterval(spawnItem, 1000 - (round*150)); // Gets faster
  gameInterval = requestAnimationFrame(updateItems);
}

function spawnItem() {
  const isGood = Math.random() > 0.3; // 70% chance good
  const emojiStr = isGood ? GOOD_ITEMS[Math.floor(Math.random()*GOOD_ITEMS.length)] : BAD_ITEMS[Math.floor(Math.random()*BAD_ITEMS.length)];
  
  const b = document.createElement('div');
  b.className = 'falling-item';
  b.textContent = emojiStr;
  b.style.left = 10 + Math.random()*(gameArea.offsetWidth-70) + 'px';
  b.style.top = '-50px';
  
  const speed = 2 + Math.random()*2 + round;
  
  gameArea.appendChild(b);
  items.push({el: b, y: -50, speed: speed, isGood: isGood});
}

function updateItems() {
  gameInterval = requestAnimationFrame(updateItems);
  const h = gameArea.offsetHeight;
  const basketRect = basket.getBoundingClientRect();
  const gameRect = gameArea.getBoundingClientRect();
  
  // Calculate basket collision area relative to gameArea
  const bx = basketRect.left - gameRect.left;
  const by = basketRect.top - gameRect.top;
  const bw = 80;
  
  for(let i=items.length-1; i>=0; i--) {
    let it = items[i];
    it.y += it.speed;
    it.el.style.top = it.y + 'px';
    
    // Collision detection (approximate center point of item and basket box)
    let ix = parseFloat(it.el.style.left) + 25;
    let iy = it.y + 40; // bottom of item
    
    if(iy > by && iy < by+40 && ix > bx && ix < bx+bw) {
      // Caught!
      it.el.remove();
      items.splice(i,1);
      
      if(it.isGood) {
        caught++;
        playSound('catch');
        updateText();
        if(caught >= TARGET_CATCH) {
          endGame();
          showFeedback(true);
          round++;
          setTimeout(()=>{ hideFeedback(); nextRound(); }, 1500);
        }
      } else {
        mistakes++;
        playSound('wrong');
        showFeedback(false);
        setTimeout(()=>hideFeedback(), 600);
      }
      continue;
    }
    
    if(it.y > h) {
      if(it.isGood) {
        // missed good item, just count as mistake if you want, but for kids maybe forgiving
      }
      it.el.remove();
      items.splice(i,1);
    }
  }
}

function playSound(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    
    if(type==='catch') {
      osc.type = 'sine'; osc.frequency.setValueAtTime(600, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime+0.1);
      gain.gain.setValueAtTime(0.5, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime+0.1);
      osc.start(); osc.stop(ctx.currentTime+0.1);
    } else {
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, ctx.currentTime);
      gain.gain.setValueAtTime(0.5, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime+0.3);
      osc.start(); osc.stop(ctx.currentTime+0.3);
    }
  } catch(e) {}
}

function endGame() {
  clearInterval(spawnInterval);
  cancelAnimationFrame(gameInterval);
  items.forEach(b => b.el.remove());
  items = [];
}

document.addEventListener('DOMContentLoaded', () => { initLanguageSelector(); initGame(); });
</script>
</body>
</html>
