<!DOCTYPE html>

    .track-tl { background-image: url('data:image/svg+xml;base64,PHN2ZyB2aWV3Qm94PScwIDAgODAgODAnIHhtbG5zPSdodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2Zyc+PHBhdGggZD0nTSA0MCAwIFEgNDAgNDAgMCA0MCBMIDAgMjAgUSAyMCAyMCAyMCAwIFonIGZpbGw9JyM5RTlFOUUnLz48L3N2Zz4='); }

    .dropzone {
      background: #C8E6C9;
      border: 2px dashed #4CAF50;
      box-sizing: border-box;
    }
    
    .dropzone.drag-over {
      background: #A5D6A7;
      border-color: #2E7D32;
    }

    .toolbox {
      display: flex;
      gap: 15px;
      background: #E0E0E0;
      padding: 15px;
      border-radius: 10px;
      min-height: 90px;
    }

    .draggable-piece {
      width: 60px;
      height: 60px;
      cursor: grab;
      filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.3));
      background-size: cover;
    }
    .draggable-piece:active { cursor: grabbing; }

    .draggable-piece.selected {
      border: 3px solid #FFEB3B;
      border-radius: 8px;
      transform: scale(1.1);
    }

    #train {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 2.5rem;
      transition: all 0.8s linear;
      z-index: 10;
      display: none;
    }
    
    .building {
      font-size: 2.5rem;
    }

    .controls-btn {
      margin-top: 15px;
      padding: 10px 30px;
      font-size: 1.2rem;
      background: #2196F3;
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      display: none;
    }

<body>

<a href="#main-content" class="skip-link">Skip to main content</a>

<div class="header">
  <button class="back-btn" onclick="location.href='../index.html'">⬅️ Back</button>
  <div class="lang-selector">
    <button onclick="setLang('hi')">हिंदी</button>
    <button onclick="setLang('en')">English</button>
    <button onclick="setLang('gu')">ગુજરાતી</button>
  </div>
</div>

<div class="container" id="main-content">
  <div class="title" data-hi="ट्रेन का रास्ता बनाओ!" data-en="Build the Train Track!" data-gu="ટ્રેનનો પાટો બનાવો!">Build the Train Track!</div>

  <!-- Progress -->
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="score-display">🌟 <span id="score">0/5</span></div>

  <div class="game-board">
    <div class="grid" id="grid">
      <div id="train">🚂</div>
      <!-- Fixed pieces generated by JS -->
    </div>
    
    <div class="title" style="font-size:1.2rem; margin-top:20px;" data-hi="यहाँ से टुकड़ा उठाकर खाली जगह में लगाओ:" data-en="Drag pieces to the missing spots:" data-gu="અહીંથી ટુકડો ઉપાડીને ખાલી જગ્યામાં મૂકો:">Drag pieces to the missing spots:</div>
    
    <div class="toolbox" id="toolbox">
      <!-- Draggable pieces generated by JS -->
    </div>
    
    <button id="go-btn" class="controls-btn" onclick="runTrain()">▶️ <span data-hi="चलाओ!" data-en="Go!" data-gu="ચલાવો!">Go!</span></button>
  </div>
</div>

<div id="completion-screen" class="completion-screen">
  <div class="completion-stars" id="completion-stars"></div>
  <div class="completion-title" id="completion-title"></div>
  <div class="completion-score" id="completion-score"></div>
  <div class="completion-best"  id="completion-best"></div>
  <button class="play-again-btn" onclick="initGame()">🔄 Play Again</button>
</div>

<script src="../js/common.js"></script>
<script>
window.playSound = function() {};
const TOTAL_ROUNDS = 5;
let round = 0, mistakes = 0;
let currentLevel = null;

// The track logic: 5 columns, 3 rows. cell index: row*5 + col
// Types: 'h' (horiz), 'v' (vert), 'br' (bottom-right), 'bl' (bottom-left), 'tr' (top-right), 'tl' (top-left).
// holes represent required pieces and dropzones.
const LEVELS = [
  // Level 1: simple straight line horizontally
  {
    start: 0, end: 4, startItem: '🏭', endItem: '🏫',
    fixed: { 0: 'track-h', 1: 'track-h', 4: 'track-h' },
    holes: { 2: 'track-h', 3: 'track-h' },
    piecesAvailable: ['track-h', 'track-h', 'track-v'],
    path: [0, 1, 2, 3, 4] // animation nodes
  },
  // Level 2: simple L shape
  {
    start: 0, end: 6, startItem: '🏭', endItem: '🎪',
    fixed: { 0: 'track-br', 5: 'track-v', 6: 'track-tl' },
    holes: { 1: 'track-h' }, // actually start at 0, curve to 5? No let's map path: 0->1->6
    piecesAvailable: ['track-br', 'track-bl', 'track-tl', 'track-v'],
    path: [] // will just do simple
  }
];

// Let's manually define reliable 5 levels
const PUZZLES = [
  {
    pathCoords: [{x:0,y:0},{x:1,y:0},{x:2,y:0},{x:3,y:0},{x:4,y:0}],
    fixed: ['0,0,h','1,0,h','4,0,h'],
    holes: ['2,0,h','3,0,h'],
    fakes: ['v','br'],
    startBuilding: '🏭', endBuilding: '🏠'
  },
  {
    pathCoords: [{x:0,y:0},{x:0,y:1},{x:1,y:1},{x:2,y:1},{x:2,y:2}],
    fixed: ['0,0,v','0,1,tr','2,1,bl','2,2,v'],
    holes: ['1,1,h'],
    fakes: ['br','tl'],
    startBuilding: '🏭', endBuilding: '🎪'
  },
  {
    pathCoords: [{x:0,y:2},{x:1,y:2},{x:1,y:1},{x:2,y:1},{x:3,y:1},{x:4,y:1}],
    fixed: ['0,2,h','1,2,tr','1,1,bl','3,1,h','4,1,h'],
    holes: ['2,1,h'],
    fakes: ['tl','br','v'],
    startBuilding: '🎪', endBuilding: '🎡'
  },
  {
    pathCoords: [{x:0,y:0},{x:1,y:0},{x:2,y:0},{x:2,y:1},{x:2,y:2},{x:3,y:2},{x:4,y:2}],
    fixed: ['0,0,h','2,0,bl','2,1,v','2,2,tr','4,2,h'],
    holes: ['1,0,h', '3,2,h'],
    fakes: ['br','v'],
    startBuilding: '🏠', endBuilding: '🏥'
  },
  {
    pathCoords: [{x:4,y:0},{x:3,y:0},{x:2,y:0},{x:2,y:1},{x:1,y:1},{x:0,y:1},{x:0,y:2}],
    fixed: ['4,0,h','2,0,br','2,1,tl','1,1,h','0,2,v'],
    holes: ['3,0,h', '0,1,bl'],
    fakes: ['h','v'],
    startBuilding: '🏥', endBuilding: '🏭'
  }
];


let correctlyPlaced = 0;
let selectedPiece = null;

function initGame() {
  round = 0; mistakes = 0; selectedPiece = null;
  hideFeedback();
  document.getElementById('completion-screen').style.display = 'none';
  loadRound();
}
  round = 0; mistakes = 0;
  hideFeedback();
  document.getElementById('completion-screen').style.display = 'none';
  loadRound();
}

function loadRound() {
  updateProgress(round, TOTAL_ROUNDS);
  if (round >= TOTAL_ROUNDS) { endGame(); return; }
  
  currentLevel = PUZZLES[round];
  correctlyPlaced = 0;
  
  const grid = document.getElementById('grid');
  const tb = document.getElementById('toolbox');
  const goBtn = document.getElementById('go-btn');
  
  grid.innerHTML = '<div id="train">🚂</div>';
  tb.innerHTML = '';
  goBtn.style.display = 'none';
  
  // Create 5x3 cells
  for(let r=0; r<3; r++) {
    for(let c=0; c<5; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.id = `cell-${c}-${r}`;
      
      // Check if start or end
      const START_NODE = currentLevel.pathCoords[0];
      const END_NODE = currentLevel.pathCoords[currentLevel.pathCoords.length-1];
      
      if(c === START_NODE.x && r === START_NODE.y) {
        cell.innerHTML = `<span>${currentLevel.startBuilding}</span>`;
      }
      if(c === END_NODE.x && r === END_NODE.y) {
        cell.innerHTML = `<span>${currentLevel.endBuilding}</span>`;
      }
      grid.appendChild(cell);
    }
  }
  
  // Set position of train initially to start node
  const train = document.getElementById('train');
  train.style.display = 'block';
  train.style.transform = `translate(${currentLevel.pathCoords[0].x * 82}px, ${currentLevel.pathCoords[0].y * 82}px)`;

  // Render fixed pieces
  currentLevel.fixed.forEach(fx => {
    const [x, y, type] = fx.split(',');
    const cell = document.getElementById(`cell-${x}-${y}`);
    const div = document.createElement('div');
    div.className = `track track-${type}`;
    cell.appendChild(div);
  });
  
  // Prepare holes
  currentLevel.holes.forEach(hl => {
    const [x, y, type] = hl.split(',');
    const cell = document.getElementById(`cell-${x}-${y}`);
    cell.classList.add('dropzone');
    cell.dataset.accept = type;
    
    // Drop logic
    cell.addEventListener('click', () => handleSlotClick(cell));
  });
  
  // Prepare toolbox pieces
  let piecesToRender = currentLevel.holes.map(h => h.split(',')[2]).concat(currentLevel.fakes);
  piecesToRender = shuffle(piecesToRender);
  
  piecesToRender.forEach((p, idx) => {
    const div = document.createElement('div');
    div.className = `draggable-piece track-${p}`;
    div.dataset.type = p;
    div.id = `piece-${idx}`;
    div.addEventListener('click', () => handlePieceClick(div));
    tb.appendChild(div);
  });
}

function handlePieceClick(piece) {
  if (selectedPiece) selectedPiece.classList.remove('selected');
  selectedPiece = piece;
  piece.classList.add('selected');
  playSound('pop');
}

function handleSlotClick(cell) {
  if (!selectedPiece) return;
  if (!cell.classList.contains('dropzone')) return;
  
  const piece = selectedPiece;
  
  if (piece.dataset.type === cell.dataset.accept) {
    // Correct
    playSound('correct');
    cell.classList.remove('dropzone');
    piece.draggable = false;
    piece.style.width = '100%';
    piece.style.height = '100%';
    cell.appendChild(piece);
    
    correctlyPlaced++;
    if (correctlyPlaced === currentLevel.holes.length) {
      document.getElementById('go-btn').style.display = 'block';
      showFeedback(true);
      playSound('tada');
    }
  } else {
    mistakes++;
    playSound('wrong');
  }
}

// Global scope train anim function
window.runTrain = function() {
  document.getElementById('go-btn').style.display = 'none';
  playSound('pop'); // Or choo choo
  
  const train = document.getElementById('train');
  const path = currentLevel.pathCoords;
  let step = 1;
  train.style.transition = 'all 0.5s linear';
  
  function moveToNext() {
    if (step < path.length) {
      train.style.transform = `translate(${path[step].x * 82}px, ${path[step].y * 82}px)`;
      step++;
      setTimeout(moveToNext, 500);
    } else {
      setTimeout(() => {
        round++;
        loadRound();
      }, 1000);
    }
  }
  
  moveToNext();
};

function endGame() {
  let stars = calculateStars(mistakes, TOTAL_ROUNDS);
  showCompletionScreen(stars);
  saveProgress('trainTrack', stars);
}

initGame();
</script>
</body>
</html>
