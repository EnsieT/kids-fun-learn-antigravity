<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fruits &amp; Veggies 🥭 · Kids Fun Learn</title>
<link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<canvas id="confetti-canvas"></canvas>

<header class="activity-header">
  <button class="back-btn" onclick="goHome()" aria-label="Go Home">🏠</button>
  <h1>🥭 Fruits &amp; Veggies</h1>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill"></div></div>
  <span class="score-display" id="score-display">0/10</span>
</header>

<div id="langSelector" class="language-selector">
  <button class="lang-btn" data-lang="en">🇬🇧 En</button>
  <button class="lang-btn" data-lang="hi">🇮🇳 हि</button>
  <button class="lang-btn" data-lang="gu">🇮🇳 ગુ</button>
</div>

<div id="game-area">
  <div class="question-area">
    <p class="question-text" id="question-text">Tap the correct one!</p>
    <button class="hear-btn" onclick="hearAgain()" aria-label="आवाज़ सुनो">🔊</button>
  </div>

  <div id="feedback-banner" class="feedback-banner"></div>

  <div class="emoji-grid" id="emoji-grid"></div>
</div>

<div id="completion-screen" class="completion-screen">
  <div class="completion-stars" id="completion-stars"></div>
  <div class="completion-title" id="completion-title"></div>
  <div class="completion-score" id="completion-score"></div>
  <div class="completion-best"  id="completion-best"></div>
  <button class="play-again-btn" onclick="initGame()">🔄 Play Again</button>
</div>

<script src="../js/common.js"></script>
<script>
const ITEMS = [
  {emoji:'🥭', en:'Mango',        hi:'आम',           gu:'કેરી'},
  {emoji:'🍌', en:'Banana',       hi:'केला',          gu:'કેળું'},
  {emoji:'🥥', en:'Coconut',      hi:'नारियल',        gu:'નાળિયેર'},
  {emoji:'🍐', en:'Guava',        hi:'अमरूद',         gu:'જામફળ'},
  {emoji:'🍅', en:'Tomato',       hi:'टमाटर',         gu:'ટામેટું'},
  {emoji:'🥔', en:'Potato',       hi:'आलू',           gu:'બટાટા'},
  {emoji:'🍆', en:'Brinjal',      hi:'बैंगन',         gu:'રીંગણ'},
  {emoji:'🌽', en:'Corn',         hi:'मकई',           gu:'મકાઈ'},
  {emoji:'🫛', en:'Peas',         hi:'मटर',           gu:'વટાણા'},
  {emoji:'🥒', en:'Cucumber',     hi:'खीरा',          gu:'કાકડી'},
  {emoji:'🧅', en:'Onion',        hi:'प्याज',         gu:'ડુંગળી'},
  {emoji:'🫑', en:'Bell Pepper',  hi:'शिमला मिर्च',   gu:'સિમ્લા મરચું'},
];

const TOTAL_ROUNDS = 10;
let round = 0, mistakes = 0, answered = false, correctItem = null;
let currentPrompt = {};

function hearAgain() { speak(currentPrompt); }

function onLanguageChange() { initGame(); }

function initGame() {
  round = 0; mistakes = 0; answered = false;
  document.getElementById('completion-screen').classList.remove('show');
  document.getElementById('game-area').classList.remove('hidden');
  hideFeedback();
  nextRound();
}

function nextRound() {
  if (round >= TOTAL_ROUNDS) { showCompletion('identify-fruits', mistakes, TOTAL_ROUNDS); return; }
  answered = false;
  hideFeedback();
  updateProgress(round, TOTAL_ROUNDS);

  const pool = shuffle(ITEMS).slice(0, 6);
  correctItem = pool[Math.floor(Math.random() * pool.length)];
  document.getElementById('question-text').innerHTML =
    `${t({en:'Tap the', hi:'छुओ', gu:'ટચ કરો'})} <strong>${t(correctItem)}</strong>! 👆`;

  currentPrompt = {en: `Tap the ${correctItem.en}!`, hi: correctItem.hi + ' को छुओ!', gu: correctItem.gu + ' ને ટચ કરો!'};
  speak(currentPrompt);

  const grid = document.getElementById('emoji-grid');
  grid.innerHTML = '';
  pool.forEach(item => {
    const div = document.createElement('div');
    div.className = 'emoji-item';
    div.innerHTML = `<span class="item-emoji">${item.emoji}</span>
                     <span class="item-label">${t(item)}</span>`;
    div.onclick = () => handleTap(div, item);
    grid.appendChild(div);
  });
}

function handleTap(el, item) {
  if (answered) return;
  if (item.emoji === correctItem.emoji) {
    answered = true;
    el.classList.add('correct');
    showFeedback(true);
    round++;
    setTimeout(() => { el.classList.remove('correct'); nextRound(); }, 1500);
  } else {
    mistakes++;
    el.classList.add('wrong');
    showFeedback(false);
    setTimeout(() => el.classList.remove('wrong'), 600);
  }
}

document.addEventListener('DOMContentLoaded', () => { initLanguageSelector(); initGame(); });
</script>
</body>
</html>
