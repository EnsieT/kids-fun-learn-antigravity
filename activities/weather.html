<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Weather Dress-Up 🌤️ · Kids Fun Learn</title>
<link rel="stylesheet" href="../css/style.css"/>
<style>
  #game-area { padding-bottom: 32px; }

  /* ── Weather Scene ──────────────────────────────────────── */
  .weather-scene {
    position: relative;
    overflow: hidden;
    min-height: 160px;
    margin: 10px 16px 6px;
    border-radius: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border: 3px solid rgba(255,255,255,.5);
    box-shadow: 0 4px 18px rgba(0,0,0,.15);
    transition: background .5s;
  }

  .weather-emoji {
    font-size: 5.5rem;
    line-height: 1;
    display: block;
    text-align: center;
    z-index: 2;
  }

  .weather-label {
    font-size: clamp(1.1rem, 4vw, 1.6rem);
    font-weight: 900;
    color: rgba(255,255,255,.95);
    text-shadow: 0 2px 6px rgba(0,0,0,.35);
    letter-spacing: .04em;
    z-index: 2;
  }

  /* Rain drops via pseudo-elements */
  .weather-scene.weather-rainy::before,
  .weather-scene.weather-rainy::after {
    content: '💧💧💧💧💧';
    position: absolute;
    top: 0; left: 0; right: 0;
    font-size: 1.1rem;
    letter-spacing: 14px;
    opacity: 0;
    animation: rain-fall 1.4s linear infinite;
    z-index: 1;
  }
  .weather-scene.weather-rainy::after {
    animation-delay: .7s;
    letter-spacing: 22px;
    font-size: .9rem;
  }

  /* Snow via pseudo-elements */
  .weather-scene.weather-cold::before,
  .weather-scene.weather-cold::after {
    content: '❄️ ❄️ ❄️ ❄️';
    position: absolute;
    top: 0; left: 0; right: 0;
    font-size: 1rem;
    letter-spacing: 16px;
    opacity: 0;
    animation: snow-drift 2.2s ease-in infinite;
    z-index: 1;
  }
  .weather-scene.weather-cold::after {
    animation-delay: 1.1s;
    letter-spacing: 26px;
    font-size: .85rem;
  }

  /* ── Weather-specific emoji animations ──────────────────── */
  @keyframes spin-slow {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  .weather-sunny .weather-emoji {
    animation: spin-slow 4s linear infinite;
  }

  @keyframes rain-fall {
    from { transform: translateY(-20px); opacity: 0; }
    40%  { opacity: .65; }
    to   { transform: translateY(80px);  opacity: 0; }
  }

  @keyframes snow-drift {
    0%   { transform: translateY(-10px) rotate(0deg);   opacity: 0; }
    30%  { opacity: .8; }
    100% { transform: translateY(70px) rotate(360deg);  opacity: 0; }
  }

  @keyframes sway {
    0%, 100% { transform: rotate(-8deg); }
    50%       { transform: rotate(8deg); }
  }
  .weather-windy .weather-emoji {
    animation: sway 1.5s ease-in-out infinite;
  }

  @keyframes float-cloud {
    0%, 100% { transform: translateY(0);    }
    50%      { transform: translateY(-12px); }
  }
  .weather-cloudy .weather-emoji {
    animation: float-cloud 3s ease-in-out infinite;
  }

  /* ── Prompt bar ─────────────────────────────────────────── */
  .prompt-bar {
    text-align: center;
    font-size: clamp(.95rem, 3vw, 1.25rem);
    font-weight: 800;
    color: #0D47A1;
    padding: 6px 16px 2px;
  }

  /* ── Clothing grid ──────────────────────────────────────── */
  .clothes-grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    padding: 10px 16px;
  }

  .cloth-btn {
    width: 82px;
    height: 82px;
    background: #fff;
    border: 3px solid #E0E0E0;
    border-radius: 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    cursor: pointer;
    transition: transform .15s, border-color .15s, background .15s, box-shadow .15s;
    font-family: var(--font);
    padding: 6px 2px;
  }
  .cloth-btn:hover  { transform: scale(1.08); box-shadow: 0 4px 12px rgba(0,0,0,.18); }
  .cloth-btn:active { transform: scale(0.93); }

  .cloth-btn.selected {
    border-color: #1565C0;
    background: #E3F2FD;
    box-shadow: 0 0 0 3px #90CAF9, 0 4px 14px rgba(21,101,192,.25);
    transform: scale(1.06);
  }

  .cloth-emoji { font-size: 2.2rem; line-height: 1; }
  .cloth-name  {
    font-size: .65rem;
    font-weight: 800;
    color: #444;
    text-align: center;
    line-height: 1.2;
    word-break: break-word;
    max-width: 76px;
  }

  /* ── Check button ───────────────────────────────────────── */
  .check-row {
    display: flex;
    justify-content: center;
    padding: 8px 16px 0;
  }

  #check-btn {
    background: linear-gradient(135deg, #4CAF50, #2E7D32);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 14px 40px;
    font-size: 1.3rem;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(46,125,50,.4);
    transition: transform .15s, box-shadow .15s, opacity .15s;
    font-family: var(--font);
  }
  #check-btn:hover:not(:disabled)  { transform: scale(1.06); box-shadow: 0 6px 18px rgba(46,125,50,.5); }
  #check-btn:active:not(:disabled) { transform: scale(0.95); }
  #check-btn:disabled {
    opacity: .45;
    cursor: not-allowed;
    box-shadow: none;
    transform: none;
  }

  /* ── Score display ──────────────────────────────────────── */
  #score-display {
    display: block;
    text-align: center;
    font-size: 1rem;
    font-weight: 800;
    color: #555;
    padding: 4px 16px 2px;
  }

  /* ── Mobile tweaks ──────────────────────────────────────── */
  @media (max-width: 420px) {
    .cloth-btn { width: 70px; height: 70px; border-radius: 14px; }
    .cloth-emoji { font-size: 1.85rem; }
    .weather-emoji { font-size: 4.2rem; }
  }
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<header class="activity-header">
  <button class="back-btn" onclick="goHome()">🏠</button>
  <h1>🌤️ Weather Dress-Up</h1>
</header>

<div id="langSelector" class="language-selector">
  <button class="lang-btn" data-lang="en">🇬🇧 En</button>
  <button class="lang-btn" data-lang="hi">🇮🇳 हि</button>
  <button class="lang-btn" data-lang="gu">🇮🇳 ગુ</button>
</div>

<div class="progress-bar"><div id="progress-fill"></div></div>
<span id="score-display"></span>

<div id="game-area">
  <div class="prompt-bar" id="prompt-bar"></div>
  <div class="weather-scene" id="weather-scene">
    <span class="weather-emoji" id="weather-emoji"></span>
    <span class="weather-label" id="weather-label"></span>
  </div>
  <div class="clothes-grid" id="clothes-grid"></div>
  <div class="check-row">
    <button id="check-btn" disabled onclick="checkAnswer()">✅ <span id="check-label">Check!</span></button>
  </div>
</div>

<div id="completion-screen" class="completion-screen hidden">
  <div class="completion-content">
    <div id="completion-stars" class="completion-stars"></div>
    <div id="completion-title" class="completion-title"></div>
    <div id="completion-score"></div>
    <div id="completion-best"></div>
    <div class="completion-buttons">
      <button onclick="restartGame()" class="btn-primary">🔄 Play Again</button>
      <button onclick="goHome()" class="btn-secondary">🏠 Home</button>
    </div>
  </div>
</div>

<div id="feedback-banner"></div>

<script src="../js/common.js"></script>
<script>
const WEATHERS = {
  sunny:  { key:'sunny',  emoji:'☀️',  bg:'linear-gradient(135deg,#FFD700,#FF8C00)', en:'Sunny',   hi:'धूप',    gu:'તડકો' },
  rainy:  { key:'rainy',  emoji:'🌧️', bg:'linear-gradient(135deg,#607D8B,#90A4AE)', en:'Rainy',   hi:'बरसात',  gu:'વરસાદ' },
  cold:   { key:'cold',   emoji:'❄️',  bg:'linear-gradient(135deg,#B3E5FC,#E1F5FE)', en:'Cold',    hi:'ठंड',    gu:'ઠંડી' },
  windy:  { key:'windy',  emoji:'🌪️', bg:'linear-gradient(135deg,#9E9E9E,#BDBDBD)', en:'Windy',   hi:'हवादार', gu:'પવનીલો' },
  cloudy: { key:'cloudy', emoji:'🌤️', bg:'linear-gradient(135deg,#CFD8DC,#ECEFF1)', en:'Cloudy',  hi:'बादल',   gu:'વાદળ' },
};

const CLOTHES = [
  { key:'umbrella',   emoji:'☂️',  en:'Umbrella',   hi:'छाता',           gu:'છત્રી' },
  { key:'jacket',     emoji:'🧥',  en:'Jacket',     hi:'जैकेट',          gu:'જેકેટ' },
  { key:'sunglasses', emoji:'🕶️', en:'Sunglasses', hi:'धूप का चश्मा',  gu:'ધૂપના ચશ્મા' },
  { key:'scarf',      emoji:'🧣',  en:'Scarf',      hi:'मफलर',           gu:'સ્કાર્ફ' },
  { key:'hat',        emoji:'👒',  en:'Hat',        hi:'टोपी',           gu:'ટોપી' },
  { key:'boots',      emoji:'🥾',  en:'Boots',      hi:'बूट',            gu:'બૂટ' },
  { key:'tshirt',     emoji:'👕',  en:'T-shirt',    hi:'टी-शर्ट',        gu:'ટી-શર્ટ' },
  { key:'shorts',     emoji:'🩳',  en:'Shorts',     hi:'शॉर्ट्स',        gu:'શોર્ટ્સ' },
  { key:'gloves',     emoji:'🧤',  en:'Gloves',     hi:'दस्ताने',        gu:'દસ્તાના' },
  { key:'sunscreen',  emoji:'🧴',  en:'Sunscreen',  hi:'सनस्क्रीन',     gu:'સનસ્ક્રીન' },
];

const CORRECT = {
  sunny:  ['sunglasses','hat','tshirt','sunscreen','shorts'],
  rainy:  ['umbrella','boots','jacket'],
  cold:   ['jacket','scarf','gloves','boots'],
  windy:  ['jacket','scarf'],
  cloudy: ['jacket','tshirt'],
};

const TOTAL_ROUNDS = 8;
let round = 0;
let mistakes = 0;
let selected = new Set();
let weatherSequence = [];
let roundLocked = false;

/* ── Build a shuffled sequence of 8 weather keys ─────────── */
function buildSequence() {
  const keys = Object.keys(WEATHERS);
  return shuffle([...keys, ...keys]).slice(0, TOTAL_ROUNDS);
}

/* ── Start / restart ─────────────────────────────────────── */
function startGame() {
  round = 0;
  mistakes = 0;
  selected.clear();
  roundLocked = false;
  weatherSequence = buildSequence();
  document.getElementById('completion-screen').classList.add('hidden');
  document.getElementById('game-area').style.display = '';
  startRound();
}

function restartGame() { startGame(); }

/* ── Round lifecycle ─────────────────────────────────────── */
function startRound() {
  if (round >= TOTAL_ROUNDS) {
    showCompletion('weather', mistakes, TOTAL_ROUNDS);
    return;
  }
  selected.clear();
  roundLocked = false;
  updateProgress(round, TOTAL_ROUNDS);
  updateScoreDisplay();
  renderWeather();
  renderClothes();
  updateCheckBtn();

  const w = WEATHERS[weatherSequence[round]];
  speak({
    en: 'What should we wear today? It is ' + w.en + '!',
    hi: 'आज क्या पहनें? ' + w.hi + ' है!',
    gu: 'આજે શું પહેરીએ? ' + w.gu + ' છે!',
  });
}

function updateScoreDisplay() {
  const correct = round - mistakes < 0 ? 0 : round - mistakes;
  document.getElementById('score-display').textContent =
    t({ en: `Round ${round + 1} of ${TOTAL_ROUNDS}`, hi: `राउंड ${round + 1} / ${TOTAL_ROUNDS}`, gu: `રાઉન્ડ ${round + 1} / ${TOTAL_ROUNDS}` });
}

/* ── Render weather scene ────────────────────────────────── */
function renderWeather() {
  const wKey = weatherSequence[round];
  const w = WEATHERS[wKey];
  const scene = document.getElementById('weather-scene');

  // Remove all weather classes then add current
  scene.className = 'weather-scene weather-' + wKey;
  scene.style.background = w.bg;

  document.getElementById('weather-emoji').textContent = w.emoji;
  document.getElementById('weather-label').textContent = t(w);
}

/* ── Render clothing buttons ─────────────────────────────── */
function renderClothes() {
  const grid = document.getElementById('clothes-grid');
  grid.innerHTML = '';
  const shuffled = shuffle([...CLOTHES]);
  shuffled.forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'cloth-btn' + (selected.has(item.key) ? ' selected' : '');
    btn.dataset.key = item.key;
    btn.setAttribute('aria-label', item.en);
    btn.innerHTML = `<span class="cloth-emoji">${item.emoji}</span><span class="cloth-name">${t(item)}</span>`;
    btn.addEventListener('click', () => toggleCloth(item.key, btn));
    grid.appendChild(btn);
  });
}

function toggleCloth(key, btn) {
  if (roundLocked) return;
  if (selected.has(key)) {
    selected.delete(key);
    btn.classList.remove('selected');
  } else {
    selected.add(key);
    btn.classList.add('selected');
    const item = CLOTHES.find(c => c.key === key);
    if (item) speak({ en: item.en, hi: item.hi, gu: item.gu });
  }
  updateCheckBtn();
}

function updateCheckBtn() {
  document.getElementById('check-btn').disabled = selected.size === 0 || roundLocked;
}

/* ── Validation ──────────────────────────────────────────── */
function checkAnswer() {
  if (roundLocked) return;
  roundLocked = true;
  updateCheckBtn();

  const wKey = weatherSequence[round];
  const required = CORRECT[wKey];
  const hits  = [...selected].filter(k => required.includes(k)).length;
  const wrong = [...selected].filter(k => !required.includes(k)).length;
  const w = WEATHERS[wKey];

  if (hits >= 2 && wrong === 0) {
    showFeedback(true);
    launchConfetti();
    speak({ en: 'Smart choice! 🌟', hi: 'बहुत होशियार! 🌟', gu: 'ખૂબ સ્માર્ટ! 🌟' });
  } else if (hits >= 1 && wrong === 0) {
    const missing = required.filter(k => !selected.has(k));
    const missingNames = missing.map(k => {
      const item = CLOTHES.find(c => c.key === k);
      return item ? t(item) : k;
    }).join(', ');
    showFeedback(false);
    mistakes++;
    speak({
      en: 'Almost! You might also need: ' + missingNames + '!',
      hi: 'लगभग सही! तुम्हें यह भी चाहिए: ' + missingNames + '!',
      gu: 'લગભગ! તમારે આ પણ જોઈએ: ' + missingNames + '!',
    });
  } else {
    showFeedback(false);
    mistakes++;
    speak({
      en: 'Hmm, is that right for ' + w.en + '? Try again!',
      hi: 'हम्म, क्या यह ' + w.hi + ' के लिए सही है? फिर कोशिश करो!',
      gu: 'હમ્મ, ' + w.gu + ' માટે આ સાચું છે? ફરી પ્રયત્ન કરો!',
    });
  }

  setTimeout(() => {
    hideFeedback();
    round++;
    startRound();
  }, 1500);
}

/* ── Language change hook ────────────────────────────────── */
function onLanguageChange() {
  document.getElementById('prompt-bar').textContent =
    t({ en: 'What should we wear today?', hi: 'आज क्या पहनें?', gu: 'આજે શું પહેરીએ?' });
  document.getElementById('check-label').textContent =
    t({ en: 'Check!', hi: 'जाँचो!', gu: 'તપાસો!' });
  if (weatherSequence.length) {
    renderWeather();
    renderClothes();
  }
  updateScoreDisplay();
}

/* ── Bootstrap ───────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  initLanguageSelector();
  document.getElementById('prompt-bar').textContent =
    t({ en: 'What should we wear today?', hi: 'आज क्या पहनें?', gu: 'આજે શું પહેરીએ?' });
  document.getElementById('check-label').textContent =
    t({ en: 'Check!', hi: 'जाँचो!', gu: 'તપાસો!' });
  startGame();
});
</script>
</body>
</html>
