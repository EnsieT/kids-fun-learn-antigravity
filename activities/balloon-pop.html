<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Balloon Pop 🎈 · Kids Fun Learn</title>
<link rel="stylesheet" href="../css/style.css"/>
<style>
  #game-area { position:relative; overflow:hidden; min-height:60vh; border-radius:16px; background:linear-gradient(to bottom, #87CEEB, #E0F7FA); touch-action:none; }
  .balloon { position:absolute; bottom:-100px; width:60px; height:80px; border-radius:50% 50% 50% 50% / 40% 40% 60% 60%; cursor:pointer; display:flex; justify-content:center; align-items:center; font-size:2rem; user-select:none; transition:transform 0.1s; }
  .balloon::after { content:''; position:absolute; bottom:-12px; left:28px; border-left:4px solid transparent; border-right:4px solid transparent; border-bottom:12px solid inherit; }
  .balloon.popped { transform:scale(1.5); opacity:0; pointer-events:none; transition:all 0.2s; }
  .cloud { position:absolute; opacity:0.6; pointer-events:none; }
  #status-bar { display:flex; justify-content:space-between; padding:10px 20px; font-weight:bold; font-size:1.2rem; background:rgba(255,255,255,0.7); }
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>

<header class="activity-header">
  <button class="back-btn" onclick="goHome()" aria-label="Go Home">🏠</button>
  <h1>🎈 Balloon Pop</h1>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill"></div></div>
  <span class="score-display" id="score-display">0/5</span>
</header>

<div id="langSelector" class="language-selector">
  <button class="lang-btn" data-lang="en">🇬🇧 En</button>
  <button class="lang-btn" data-lang="hi">🇮🇳 हि</button>
  <button class="lang-btn" data-lang="gu">🇮🇳 ગુ</button>
</div>

<div class="question-area" style="margin-bottom:8px;">
  <p class="question-text" id="question-text">Pop the balloons!</p>
  <button class="hear-btn" onclick="hearAgain()" aria-label="आवाज़ सुनो">🔊</button>
</div>

<div id="game-area">
  <div id="status-bar">
    <span id="target-ui">Target: 🎈</span>
  </div>
  <div id="feedback-banner" class="feedback-banner"></div>
</div>

<div id="completion-screen" class="completion-screen">
  <div class="completion-stars" id="completion-stars">⭐⭐⭐</div>
  <div class="completion-title" id="completion-title"></div>
  <div class="completion-score" id="completion-score"></div>
  <div class="completion-best"  id="completion-best"></div>
  <button class="play-again-btn" onclick="initGame()">🔄 Play Again</button>
</div>

<script src="../js/common.js"></script>
<script>
const COLORS = [
  {id:'red',     hex:'#FF5252', en:'Red',   hi:'लाल',    gu:'લાલ'},
  {id:'blue',    hex:'#448AFF', en:'Blue',  hi:'नीला',   gu:'વાદળી'},
  {id:'green',   hex:'#4CAF50', en:'Green', hi:'हरा',    gu:'લીલો'},
  {id:'yellow',  hex:'#FFEB3B', en:'Yellow',hi:'पीला',   gu:'પીળો'},
  {id:'purple',  hex:'#E040FB', en:'Purple',hi:'बैंगनी', gu:'જાંબલી'}
];

const TOTAL_ROUNDS = 5;
let round = 0, mistakes = 0;
let poppedCount = 0;
let targetColor = null;
let currentPrompt = {};
let gameInterval, spawnInterval;
let balloons = [];

function hearAgain() { speak(currentPrompt); }
function onLanguageChange() { updateText(); }

function initGame() {
  round = 0; mistakes = 0;
  document.getElementById('completion-screen').classList.remove('show');
  hideFeedback();
  nextRound();
}

function updateText() {
  if(!targetColor) return;
  document.getElementById('question-text').textContent = t({
    en:`Pop 5 ${targetColor.en} balloons!`,
    hi:`5 ${targetColor.hi} गुब्बारे फोड़ो!`,
    gu:`5 ${targetColor.gu} ફુગ્ગા ફોડો!`
  });
  document.getElementById('target-ui').textContent = `🎯 ${poppedCount}/5`;
}

function nextRound() {
  if(round >= TOTAL_ROUNDS) {
    endGame();
    showCompletion('balloon-pop', mistakes, TOTAL_ROUNDS*5);
    return;
  }
  poppedCount = 0;
  targetColor = COLORS[Math.floor(Math.random() * COLORS.length)];
  updateText();
  
  updateProgress(round, TOTAL_ROUNDS);
  document.getElementById('score-display').textContent = `${round}/${TOTAL_ROUNDS}`;
  
  currentPrompt = {
    en:`Pop the ${targetColor.en} balloons!`,
    hi:`${targetColor.hi} गुब्बारे फोड़ो!`,
    gu:`${targetColor.gu} ફુગ્ગા ફોડો!`
  };
  speak(currentPrompt);
  startGameLoop();
}

function startGameLoop() {
  endGame(); // clear old
  document.getElementById('game-area').querySelectorAll('.balloon').forEach(e=>e.remove());
  
  spawnInterval = setInterval(spawnBalloon, 800);
  gameInterval = requestAnimationFrame(updateBalloons);
}

function spawnBalloon() {
  const gameArea = document.getElementById('game-area');
  // 40% chance of target color
  const col = (Math.random()<0.4) ? targetColor : COLORS[Math.floor(Math.random()*COLORS.length)];
  
  const b = document.createElement('div');
  b.className = 'balloon';
  b.style.backgroundColor = col.hex;
  b.style.left = 10 + Math.random()*(gameArea.offsetWidth-70) + 'px';
  b.style.bottom = '-100px';
  // physics
  const speed = 1.5 + Math.random()*2;
  const swaySpeed = 0.02 + Math.random()*0.02;
  
  b.dataset.color = col.id;
  b.onclick = () => popBalloon(b, col.id);
  
  gameArea.appendChild(b);
  balloons.push({el: b, y: -100, xOffset: 0, speed, swaySpeed, time: Math.random()*100});
}

function updateBalloons() {
  gameInterval = requestAnimationFrame(updateBalloons);
  const gameArea = document.getElementById('game-area');
  const h = gameArea.offsetHeight;
  
  for(let i=balloons.length-1; i>=0; i--) {
    let b = balloons[i];
    if(b.el.classList.contains('popped')) { balloons.splice(i,1); continue; }
    
    b.y += b.speed;
    b.time += b.swaySpeed;
    const sway = Math.sin(b.time)*20;
    
    b.el.style.bottom = b.y + 'px';
    b.el.style.transform = `translateX(${sway}px)`;
    
    if(b.y > h + 50) {
      if(b.el.dataset.color === targetColor.id) {
        // missed target! Mistake? it's okay for 4 year old, no penalty for miss.
      }
      b.el.remove();
      balloons.splice(i,1);
    }
  }
}

function popBalloon(el, colId) {
  if(el.classList.contains('popped')) return;
  el.classList.add('popped');
  
  if(colId === targetColor.id) {
    poppedCount++;
    playSound('pop');
    updateText();
    if(poppedCount >= 5) {
      endGame();
      showFeedback(true);
      round++;
      setTimeout(()=>{ hideFeedback(); nextRound(); }, 1500);
    }
  } else {
    mistakes++;
    playSound('wrong');
    showFeedback(false);
    setTimeout(()=>hideFeedback(), 600);
  }
}

function playSound(type) {
  // Try audio if exists or use JS synth
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    
    if(type==='pop') {
      osc.type = 'sine'; osc.frequency.setValueAtTime(400, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime+0.1);
      gain.gain.setValueAtTime(1, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime+0.1);
      osc.start(); osc.stop(ctx.currentTime+0.1);
    } else {
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, ctx.currentTime);
      gain.gain.setValueAtTime(0.5, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime+0.3);
      osc.start(); osc.stop(ctx.currentTime+0.3);
    }
  } catch(e) {}
}

function endGame() {
  clearInterval(spawnInterval);
  cancelAnimationFrame(gameInterval);
  balloons.forEach(b => b.el.remove());
  balloons = [];
}

document.addEventListener('DOMContentLoaded', () => { initLanguageSelector(); initGame(); });
</script>
</body>
</html>
