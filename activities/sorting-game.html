<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sort into Baskets 🧺 · Kids Fun Learn</title>
<link rel="stylesheet" href="../css/style.css"/>
<style>
  .sort-arena {
    max-width: 560px;
    margin: 0 auto;
    padding: 8px 16px;
  }

  /* Item display */
  .sort-item-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 0 4px;
  }
  .sort-item-card {
    font-size: clamp(4rem, 15vw, 6rem);
    background: #fff;
    border-radius: 24px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.15);
    width: 130px;
    height: 130px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.35s cubic-bezier(.34,1.56,.64,1);
    user-select: none;
  }
  .sort-item-card.bounce-in {
    animation: bounceIn 0.45s ease;
  }
  .sort-item-card.fly-correct {
    animation: flyCorrect 0.5s forwards;
  }
  .sort-item-card.bounce-back {
    animation: bounceBack 0.55s ease;
  }
  @keyframes bounceIn {
    0%   { transform: scale(0.3) translateY(-40px); opacity:0; }
    70%  { transform: scale(1.1); }
    100% { transform: scale(1); opacity:1; }
  }
  @keyframes flyCorrect {
    0%   { transform: scale(1); opacity:1; }
    100% { transform: scale(0.2) translateY(120px); opacity:0; }
  }
  @keyframes bounceBack {
    0%   { transform: translateX(0); }
    25%  { transform: translateX(-22px) rotate(-8deg); }
    50%  { transform: translateX(22px) rotate(8deg); }
    75%  { transform: translateX(-10px) rotate(-4deg); }
    100% { transform: translateX(0) rotate(0); }
  }

  /* Progress */
  .sort-progress-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px 0;
    font-weight: 800;
    color: #555;
    font-size: 1rem;
  }
  .sort-progress-bar {
    flex: 1;
    height: 12px;
    background: rgba(0,0,0,0.1);
    border-radius: 50px;
    overflow: hidden;
  }
  .sort-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #4CAF50, #8BC34A);
    border-radius: 50px;
    transition: width 0.4s ease;
  }

  /* Baskets */
  .baskets-row {
    display: flex;
    gap: 16px;
    justify-content: center;
    padding: 8px 0;
    margin-top: 8px;
  }
  .basket {
    flex: 1;
    max-width: 200px;
    min-height: 110px;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    cursor: pointer;
    border: 5px solid transparent;
    background: #fff;
    box-shadow: 0 6px 22px rgba(0,0,0,0.12);
    transition: transform 0.15s, border-color 0.2s, background 0.2s;
    padding: 16px 8px;
    font-size: 2.8rem;
    position: relative;
    overflow: hidden;
  }
  .basket:hover  { transform: translateY(-4px) scale(1.04); box-shadow: 0 10px 30px rgba(0,0,0,0.18); }
  .basket:active { transform: scale(0.97); }
  .basket.basket-a { border-color: #4CAF50; background: #E8F5E9; }
  .basket.basket-b { border-color: #FF8C00; background: #FFF3E0; }
  .basket.correct-flash {
    animation: basketPulse 0.5s;
  }
  .basket.wrong-flash {
    animation: shake 0.5s;
    background: #FFEBEE !important;
    border-color: #F44336 !important;
  }
  @keyframes basketPulse {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.08); }
    100% { transform: scale(1); }
  }
  .basket-label {
    font-size: 0.8rem;
    font-weight: 900;
    color: #444;
    text-align: center;
    line-height: 1.3;
  }

  .round-title {
    text-align: center;
    font-size: 1rem;
    font-weight: 900;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 4px 0;
  }
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>

<header class="activity-header">
  <button class="back-btn" onclick="goHome()" aria-label="Go Home">🏠</button>
  <h1>🧺 Sort into Baskets</h1>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill"></div></div>
  <span class="score-display" id="score-display">0/10</span>
</header>

<div id="langSelector" class="language-selector">
  <button class="lang-btn" data-lang="en">🇬🇧 En</button>
  <button class="lang-btn" data-lang="hi">🇮🇳 हि</button>
  <button class="lang-btn" data-lang="gu">🇮🇳 ગુ</button>
</div>

<div id="game-area">
  <div class="question-area">
    <p class="question-text" id="question-text">Sort it!</p>
    <button class="hear-btn" onclick="hearAgain()" aria-label="आवाज़ सुनो">🔊</button>
  </div>

  <div id="feedback-banner" class="feedback-banner"></div>

  <div class="sort-arena">
    <div class="round-title" id="round-title"></div>

    <!-- Item display -->
    <div class="sort-item-wrap">
      <div class="sort-item-card bounce-in" id="current-item">🥭</div>
    </div>

    <!-- Progress -->
    <div class="sort-progress-row">
      <span id="sort-count">0/10</span>
      <div class="sort-progress-bar">
        <div class="sort-progress-fill" id="sort-fill" style="width:0%"></div>
      </div>
    </div>

    <!-- Baskets -->
    <div class="baskets-row">
      <div class="basket basket-a" id="basket-a" onclick="handleBasket('a')">
        <span id="basket-a-emoji">🍎</span>
        <span class="basket-label" id="basket-a-label">Fruits<br/>फल</span>
      </div>
      <div class="basket basket-b" id="basket-b" onclick="handleBasket('b')">
        <span id="basket-b-emoji">🥕</span>
        <span class="basket-label" id="basket-b-label">Veggies<br/>सब्ज़ी</span>
      </div>
    </div>
  </div>
</div>

<div id="completion-screen" class="completion-screen">
  <div class="completion-stars" id="completion-stars"></div>
  <div class="completion-title" id="completion-title"></div>
  <div class="completion-score" id="completion-score"></div>
  <div class="completion-best"  id="completion-best"></div>
  <button class="play-again-btn" onclick="initGame()">🔄 Play Again</button>
</div>

<script src="../js/common.js"></script>
<script>
const ROUND_TYPES = [
  {
    titleHi: '🍎 फल vs 🥕 सब्ज़ी',
    catA: {label:{en:'Fruits',    hi:'फल',    gu:'ફળ'},   emoji:'🍎'},
    catB: {label:{en:'Veggies',   hi:'सब्ज़ी', gu:'શાક'},  emoji:'🥕'},
    items: [
      {emoji:'🥭',hi:'आम',       gu:'કેરી',    cat:'a'},
      {emoji:'🍌',hi:'केला',     gu:'કેળું',   cat:'a'},
      {emoji:'🍎',hi:'सेब',      gu:'સફરજન',   cat:'a'},
      {emoji:'🍊',hi:'संतरा',    gu:'નારંગી',  cat:'a'},
      {emoji:'🥥',hi:'नारियल',   gu:'નાળિયેર', cat:'a'},
      {emoji:'🥕',hi:'गाजर',     gu:'ગાજર',    cat:'b'},
      {emoji:'🥔',hi:'आलू',      gu:'બટાટા',   cat:'b'},
      {emoji:'🍆',hi:'बैंगन',    gu:'રીંગણ',   cat:'b'},
      {emoji:'🌽',hi:'मकई',      gu:'મકાઈ',    cat:'b'},
      {emoji:'🧅',hi:'प्याज',    gu:'ડુંગળી',  cat:'b'},
    ]
  },
  {
    titleHi: '🐾 जानवर vs 🚗 वाहन',
    catA: {label:{en:'Animals',  hi:'जानवर',  gu:'પ્રાણી'}, emoji:'🐾'},
    catB: {label:{en:'Vehicles', hi:'वाहन',   gu:'વાહન'},   emoji:'🚗'},
    items: [
      {emoji:'🐄',hi:'गाय',     gu:'ગાય',        cat:'a'},
      {emoji:'🐘',hi:'हाथी',    gu:'હાથી',       cat:'a'},
      {emoji:'🦚',hi:'मोर',     gu:'મોર',        cat:'a'},
      {emoji:'🐯',hi:'बाघ',     gu:'વાઘ',        cat:'a'},
      {emoji:'🐕',hi:'कुत्ता',  gu:'કૂતરો',      cat:'a'},
      {emoji:'🚗',hi:'कार',      gu:'ગાડી',       cat:'b'},
      {emoji:'🚌',hi:'बस',       gu:'બસ',         cat:'b'},
      {emoji:'✈️',hi:'हवाई जहाज',gu:'વિમાન',      cat:'b'},
      {emoji:'🚂',hi:'ट्रेन',    gu:'ટ્રેઇન',     cat:'b'},
      {emoji:'🚲',hi:'साइकिल',   gu:'સાઇકલ',     cat:'b'},
    ]
  },
  {
    titleHi: '✈️ उड़ने वाले vs 🐟 पानी वाले',
    catA: {label:{en:'Flies',   hi:'उड़ता है',    gu:'ઉડે છે'},      emoji:'✈️'},
    catB: {label:{en:'Swims',   hi:'पानी में',    gu:'પાણીમાં'},     emoji:'🐟'},
    items: [
      {emoji:'✈️',hi:'हवाई जहाज', gu:'વિમાન',       cat:'a'},
      {emoji:'🦅',hi:'चील',        gu:'ગરુડ',        cat:'a'},
      {emoji:'🦋',hi:'तितली',       gu:'પતંગિયું',    cat:'a'},
      {emoji:'🦜',hi:'तोता',        gu:'પોપટ',        cat:'a'},
      {emoji:'🚁',hi:'हेलीकॉप्टर', gu:'હેલિકૉપ્ટર', cat:'a'},
      {emoji:'🐟',hi:'मछली',        gu:'માછલી',       cat:'b'},
      {emoji:'🐬',hi:'डॉल्फिन',    gu:'ડૉલ્ફિન',     cat:'b'},
      {emoji:'🦈',hi:'शार्क',       gu:'શાર્ક',       cat:'b'},
      {emoji:'🐊',hi:'मगरमच्छ',    gu:'મગર',         cat:'b'},
      {emoji:'🐸',hi:'मेंढक',       gu:'દેડકો',       cat:'b'},
    ]
  },
  {
    titleHi: '🔴 लाल vs 🔵 नीला',
    catA: {label:{en:'Red',  hi:'लाल',  gu:'લાલ'},   emoji:'🔴'},
    catB: {label:{en:'Blue', hi:'नीला', gu:'વાદળી'}, emoji:'🔵'},
    items: [
      {emoji:'🍎',hi:'लाल सेब',    gu:'લાલ સફરજન',  cat:'a'},
      {emoji:'🌹',hi:'लाल गुलाब',  gu:'લાલ ગુલાબ',  cat:'a'},
      {emoji:'🍅',hi:'टमाटर',      gu:'ટામેટું',     cat:'a'},
      {emoji:'🌶️',hi:'लाल मिर्च', gu:'લાલ મરચું',  cat:'a'},
      {emoji:'🎈',hi:'लाल गुब्बारा',gu:'લાલ ફુગ્ગો', cat:'a'},
      {emoji:'🫐',hi:'ब्लूबेरी',   gu:'બ્લૂબેરી',   cat:'b'},
      {emoji:'💧',hi:'पानी',        gu:'પાણી',        cat:'b'},
      {emoji:'🌊',hi:'समुद्र',      gu:'સમુદ્ર',      cat:'b'},
      {emoji:'🔷',hi:'नीला हीरा',   gu:'વાદળી હીરો', cat:'b'},
      {emoji:'🫙',hi:'नीला जार',    gu:'વાદળી ઢાંકણ', cat:'b'},
    ]
  },
];

const ITEMS_PER_ROUND = 10;
const TOTAL_ROUNDS = ROUND_TYPES.length;

let roundIdx = 0;
let itemQueue = [];
let itemPos = 0;
let mistakes = 0;
let totalAnswered = 0;
let totalItems = 0;
let isAnimating = false;
const currentPrompt = {en: 'Sort it!', hi: 'सही टोकरी में डालो!', gu: 'સાચી ટોપલીમાં નાખો!'};

function hearAgain() {
  const itemEl = document.getElementById('current-item');
  if (itemEl && itemEl.dataset.hi) {
    speak({en: itemEl.dataset.en || itemEl.dataset.hi, hi: itemEl.dataset.hi, gu: itemEl.dataset.gu || itemEl.dataset.hi});
  } else {
    speak(currentPrompt);
  }
}

function onLanguageChange() { initGame(); }

function initGame() {
  roundIdx = 0; mistakes = 0; totalAnswered = 0;
  document.getElementById('completion-screen').classList.remove('show');
  document.getElementById('game-area').classList.remove('hidden');
  document.getElementById('question-text').textContent = t(currentPrompt);
  hideFeedback();
  loadRound(0);
}

function loadRound(idx) {
  if (idx >= TOTAL_ROUNDS) {
    finishGame();
    return;
  }
  roundIdx = idx;
  const rt = ROUND_TYPES[idx];
  itemQueue = shuffle([...rt.items]);
  itemPos = 0;
  isAnimating = false;

  document.getElementById('round-title').textContent = rt.titleHi;
  document.getElementById('basket-a-emoji').textContent = rt.catA.emoji;
  document.getElementById('basket-a-label').textContent = t(rt.catA.label);
  document.getElementById('basket-b-emoji').textContent = rt.catB.emoji;
  document.getElementById('basket-b-label').textContent = t(rt.catB.label);

  totalItems = itemQueue.length;
  updateSortProgress(0, totalItems);
  showNextItem();
}

function showNextItem() {
  if (itemPos >= itemQueue.length) {
    // Finished this round → next
    roundIdx++;
    if (roundIdx < TOTAL_ROUNDS) {
      setTimeout(() => loadRound(roundIdx), 700);
    } else {
      setTimeout(finishGame, 700);
    }
    return;
  }
  const item = itemQueue[itemPos];
  const el = document.getElementById('current-item');
  el.textContent = item.emoji;
  el.dataset.hi  = item.hi;
  el.dataset.gu  = item.gu || item.hi;
  el.dataset.en  = item.emoji;
  el.dataset.cat = item.cat;
  el.className = 'sort-item-card bounce-in';
  void el.offsetWidth;

  speak({en: item.emoji, hi: item.hi, gu: item.gu || item.hi});
}

function handleBasket(side) {
  if (isAnimating) return;
  const el = document.getElementById('current-item');
  const correct = el.dataset.cat;

  if (side === correct) {
    // Correct!
    isAnimating = true;
    el.className = 'sort-item-card fly-correct';
    const basketEl = document.getElementById('basket-' + side);
    basketEl.classList.add('correct-flash');
    setTimeout(() => basketEl.classList.remove('correct-flash'), 500);
    showFeedback(true);
    speak({en: 'Correct!', hi: 'सही!', gu: 'સાચું!'});
    totalAnswered++;
    itemPos++;
    updateSortProgress(itemPos, totalItems);
    updateProgress(totalAnswered, TOTAL_ROUNDS * ITEMS_PER_ROUND);
    document.getElementById('score-display').textContent = totalAnswered + '/' + (TOTAL_ROUNDS * ITEMS_PER_ROUND);
    setTimeout(() => {
      isAnimating = false;
      hideFeedback();
      showNextItem();
    }, 650);
  } else {
    // Wrong
    mistakes++;
    el.className = 'sort-item-card bounce-back';
    const basketEl = document.getElementById('basket-' + side);
    basketEl.classList.add('wrong-flash');
    showFeedback(false);
    setTimeout(() => {
      basketEl.classList.remove('wrong-flash');
      el.className = 'sort-item-card bounce-in';
    }, 600);
  }
}

function updateSortProgress(current, total) {
  const pct = total > 0 ? (current / total * 100) : 0;
  document.getElementById('sort-fill').style.width = pct + '%';
  document.getElementById('sort-count').textContent = current + '/' + total;
}

function finishGame() {
  const totalDone = TOTAL_ROUNDS * ITEMS_PER_ROUND;
  showCompletion('sorting-game', mistakes, totalDone);
}

document.addEventListener('DOMContentLoaded', () => { initLanguageSelector(); initGame(); });
</script>
</body>
</html>
