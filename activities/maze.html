<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Maze 🎮 Kids Fun Learn</title>
<meta name="description" content="Navigate through exciting mazes from start to finish! A problem-solving adventure game for kids aged 4-6."/>
<meta property="og:title" content="Maze Adventure 🎮 Kids Fun Learn"/>
<meta property="og:description" content="Navigate through exciting mazes from start to finish! A problem-solving adventure game for kids aged 4-6."/>
<meta property="og:type" content="website"/>
<link rel="stylesheet" href="../css/style.css"/>
<style>
#maze-container { display:flex; flex-direction:column; align-items:center; gap:.8rem; padding:1rem; }
#difficulty-btns { display:flex; gap:.5rem; flex-wrap:wrap; justify-content:center; }
.diff-btn {
  padding:.5rem 1rem; border-radius:20px; border:2px solid #e0a030;
  background:#fff8e1; font-size:1rem; cursor:pointer; transition:all .2s;
  min-height:44px; touch-action:manipulation;
}
.diff-btn.active { background:#e0a030; color:#fff; }
#stats-bar { display:flex; gap:1.2rem; font-size:1rem; font-weight:bold; color:#5C4A1E; }
#maze-scroll { overflow:auto; max-width:100vw; padding:4px; }
#maze-grid { display:grid; gap:0; touch-action:none; user-select:none; }
.maze-cell {
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; box-sizing:border-box; transition:background-color .15s;
  -webkit-tap-highlight-color:transparent; position:relative;
}
.maze-cell.visited  { background:rgba(144,238,144,.45); }
.maze-cell.current  { background:rgba(255,215,0,.38); z-index:2; }
.maze-cell.end-cell { background:rgba(76,175,80,.22); }
.maze-cell.shake    { animation:cell-shake .3s ease; }
@keyframes cell-shake {
  0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)}
}
.maze-cell span { pointer-events:none; line-height:1; }
</style>
<meta name="theme-color" content="#FFD700"/>
</head>
<body>
<canvas id="confetti-canvas" aria-hidden="true"></canvas>

<header class="activity-header">
  <button class="back-btn" onclick="goHome()" aria-label="Go Home" aria-label="Go Home">🏠</button>
  <h1>🌀 Maze</h1>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill"></div></div>
  <span class="score-display" id="score-display">0</span>
</header>

<div id="langSelector" class="language-selector">
  <button class="lang-btn" data-lang="en">🇬🇧 En</button>
  <button class="lang-btn" data-lang="hi">🇮🇳 हि</button>
  <button class="lang-btn" data-lang="gu">🇮🇳 ગુ</button>
</div>

<div id="game-area">
  <div id="maze-container">
    <p class="question-text" id="prompt-text"></p>
    <div id="difficulty-btns">
      <button class="diff-btn active" onclick="setDifficulty('easy1')">🐣 Easy 1</button>
      <button class="diff-btn"        onclick="setDifficulty('easy2')">🐣 Easy 2</button>
      <button class="diff-btn"        onclick="setDifficulty('easy3')">🐣 Easy 3</button>
      <button class="diff-btn"        onclick="setDifficulty('easy4')">🐣 Easy 4</button>
      <button class="diff-btn"        onclick="setDifficulty('easy5')">🐣 Easy 5</button>
      <button class="diff-btn"        onclick="setDifficulty('medium')">🐥 Medium</button>
      <button class="diff-btn"        onclick="setDifficulty('hard')">🐓 Hard</button>
    </div>
    <div id="stats-bar">
      <span id="wrong-count">❌ 0</span>
      <span id="steps-count">👣 0</span>
    </div>
    <div id="maze-scroll">
      <div id="maze-grid"></div>
    </div>
  </div>
  <div id="feedback-banner" class="feedback-banner"></div>
</div>

<div id="completion-screen" class="completion-screen">
  <div class="completion-stars" id="completion-stars">⭐⭐⭐</div>
  <div class="completion-title" id="completion-title"></div>
  <div class="completion-score" id="completion-score"></div>
  <div class="completion-best"  id="completion-best"></div>
  <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
    <button class="play-again-btn" id="play-again-btn" onclick="initGame()">🔄 Play Again</button>
    <button class="play-again-btn" id="next-lvl-btn" onclick="nextLevel()" style="background: linear-gradient(135deg, #FF9800, #F57C00);">➡️ Next Level</button>
  </div>
</div>

<script src="../js/common.js"></script>
<script>
/* ── Seeded LCG random ── */
function seededRand(seed) {
  let s = seed | 0;
  return () => { s = Math.imul(1664525, s) + 1013904223 | 0; return (s >>> 0) / 4294967296; };
}

/* ── Iterative DFS maze generation ── */
function generateMaze(size, seed) {
  const rand = seededRand(seed);
  const shuffleR = arr => {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(rand()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
    return a;
  };
  const walls = Array.from({length:size}, () =>
    Array.from({length:size}, () => ({N:true,S:true,E:true,W:true})));
  const visited = Array.from({length:size}, () => new Array(size).fill(false));
  const DIRS = [[-1,0,'N','S'],[1,0,'S','N'],[0,1,'E','W'],[0,-1,'W','E']];
  const stack = [[0,0]];
  visited[0][0] = true;
  while (stack.length) {
    const [r,c] = stack[stack.length-1];
    const unv = shuffleR(DIRS).filter(([dr,dc]) => {
      const nr=r+dr, nc=c+dc;
      return nr>=0&&nr<size&&nc>=0&&nc<size&&!visited[nr][nc];
    });
    if (!unv.length) { stack.pop(); continue; }
    const [dr,dc,w,opp] = unv[0];
    const nr=r+dr, nc=c+dc;
    walls[r][c][w]=false; walls[nr][nc][opp]=false;
    visited[nr][nc]=true; stack.push([nr,nc]);
  }
  return walls;
}

/* ── Config ── */
const DIFFS = {
  easy1:  {size:5, cs:64, seed:42},
  easy2:  {size:5, cs:64, seed:150},
  easy3:  {size:5, cs:64, seed:300},
  easy4:  {size:5, cs:64, seed:450},
  easy5:  {size:5, cs:64, seed:600},
  medium: {size:7, cs:46, seed:137},
  hard:   {size:9, cs:36, seed:999},
};
const WALL_CLR  = '#5C3D11';
const WALL_W    = '4px';
const OPEN_CLR  = 'rgba(180,150,100,0.15)';
const OPEN_W    = '1px';

let difficulty = 'easy1';
let mazeWalls = null, currentPos = {r:0,c:0};
let visitedSet = new Set(), wrongMoves = 0, stepCount = 0, gameWon = false;

const MAZE_THEMES = [
  {p_en:'Help the cow reach the grass!', p_hi:'गाय को घास तक पहुंचाओ!', p_gu:'ગાયને ઘાસ સુધી પહોંચાડો!', hero:'🐄', goal:'🌾'},
  {p_en:'Help the bunny reach the carrot!', p_hi:'खरगोश को गाजर तक पहुंचाओ!', p_gu:'સસલાને ગાજર સુધી પહોંચાડો!', hero:'🐇', goal:'🥕'},
  {p_en:'Help the monkey reach the banana!', p_hi:'बंदर को केले तक पहुंचाओ!', p_gu:'વાંદરાને કેળા સુધી પહોંચાડો!', hero:'🐒', goal:'🍌'},
  {p_en:'Help the bee reach the flower!', p_hi:'मधुमक्खी को फूल तक पहुंचाओ!', p_gu:'મધમાખીને ફૂલ સુધી પહોંચાડો!', hero:'🌸', goal:'🍯'},
  {p_en:'Help the squirrel reach the nut!', p_hi:'गिलहरी को अखरोट तक पहुंचाओ!', p_gu:'ખિસકોલીને અખરોટ સુધી પહોંચાડો!', hero:'🐿️', goal:'🥜'},
  {p_en:'Help the fish reach the coral!', p_hi:'मछली को मूंगे तक पहुंचाओ!', p_gu:'માછલીને પરવાળા સુધી પહોંચાડો!', hero:'🐠', goal:'🪸'},
  {p_en:'Help the astronaut reach the planet!', p_hi:'अंतरिक्ष यात्री को ग्रह तक पहुंचाओ!', p_gu:'અંતરિક્ષયાત્રીને ગ્રહ સુધી પહોંચાડો!', hero:'👨‍🚀', goal:'🪐'},
  {p_en:'Help the car reach the house!', p_hi:'कार को घर तक पहुंचाओ!', p_gu:'કારને ઘર સુધી પહોંચાડો!', hero:'🚗', goal:'🏠'}
];
let currentTheme = MAZE_THEMES[0];

function setDifficulty(d) {
  difficulty = d;
  document.querySelectorAll('.diff-btn').forEach((btn,i) => {
    btn.classList.toggle('active', ['easy1','easy2','easy3','easy4','easy5','medium','hard'][i]===d);
  });
  initGame();
}

function nextLevel() {
  const diffs = ['easy1','easy2','easy3','easy4','easy5','medium','hard'];
  let idx = diffs.indexOf(difficulty);
  if (idx < diffs.length - 1) {
    setDifficulty(diffs[idx+1]);
  } else {
    initGame();
  }
}

function onLanguageChange() {
  updatePromptText();
  document.getElementById('play-again-btn').textContent =
    t({en:'🔄 Play Again', hi:'🔄 फिर से खेलो', gu:'🔄 ફરી રમો'});
}

function updatePromptText() {
  const p = {en:currentTheme.p_en, hi:currentTheme.p_hi, gu:currentTheme.p_gu};
  document.getElementById('prompt-text').textContent = t(p);
}

function initGame() {
  gameWon=false; wrongMoves=0; stepCount=0;
  currentPos={r:0,c:0}; visitedSet=new Set(['0,0']);

  // Randomize theme
  currentTheme = pickRandom(MAZE_THEMES, 1)[0];

  const conf = DIFFS[difficulty];
  // Mix seed with theme pick so maze shapes vary even more, but we can stick to base logic
  mazeWalls = generateMaze(conf.size, conf.seed + Math.floor(Math.random() * 100));
  document.getElementById('completion-screen').classList.remove('show');
  document.getElementById('game-area').classList.remove('hidden');
  hideFeedback(); updateStats(); renderMaze(); updatePromptText();
  const p = {en:currentTheme.p_en, hi:currentTheme.p_hi, gu:currentTheme.p_gu};
  setTimeout(()=>speak(p),300);
}

function updateStats() {
  document.getElementById('wrong-count').textContent = `❌ ${wrongMoves}`;
  document.getElementById('steps-count').textContent = `👣 ${stepCount}`;
  const sz = DIFFS[difficulty].size;
  updateProgress(visitedSet.size, sz*sz);
  document.getElementById('score-display').textContent = visitedSet.size + '/' + (sz*sz);
}

function renderMaze() {
  const {size, cs} = DIFFS[difficulty];
  const grid = document.getElementById('maze-grid');
  grid.style.gridTemplateColumns = `repeat(${size},${cs}px)`;
  grid.innerHTML = '';

  for (let r=0; r<size; r++) {
    for (let c=0; c<size; c++) {
      const cell = document.createElement('div');
      cell.className = 'maze-cell';
      cell.style.width  = cs+'px';
      cell.style.height = cs+'px';
      cell.style.fontSize = Math.floor(cs*.62)+'px';
      cell.dataset.r = r; cell.dataset.c = c;

      /* Border rendering: N and W for all cells, E/S only for outer boundary */
      const w = mazeWalls[r][c];
      cell.style.borderTop    = w.N ? `${WALL_W} solid ${WALL_CLR}` : `${OPEN_W} solid ${OPEN_CLR}`;
      cell.style.borderLeft   = w.W ? `${WALL_W} solid ${WALL_CLR}` : `${OPEN_W} solid ${OPEN_CLR}`;
      cell.style.borderRight  = (c===size-1) ? `${WALL_W} solid ${WALL_CLR}` : `${OPEN_W} solid ${OPEN_CLR}`;
      cell.style.borderBottom = (r===size-1) ? `${WALL_W} solid ${WALL_CLR}` : `${OPEN_W} solid ${OPEN_CLR}`;

      const isCurrent = r===currentPos.r && c===currentPos.c;
      const isEnd     = r===size-1 && c===size-1;
      if (visitedSet.has(`${r},${c}`) && !isCurrent) cell.classList.add('visited');
      if (isCurrent)  cell.classList.add('current');
      if (isEnd)      cell.classList.add('end-cell');

      if (isCurrent) { const sp=document.createElement('span'); sp.textContent=currentTheme.hero; cell.appendChild(sp); }
      else if (isEnd) { const sp=document.createElement('span'); sp.textContent=currentTheme.goal; cell.appendChild(sp); }

      cell.addEventListener('pointerdown', onCellPointer);
      grid.appendChild(cell);
    }
  }
}

function onCellPointer(e) {
  e.preventDefault();
  if (gameWon) return;
  handleMove(parseInt(e.currentTarget.dataset.r), parseInt(e.currentTarget.dataset.c));
}

function handleMove(r, c) {
  const {r:cr, c:cc} = currentPos;
  const dr=r-cr, dc=c-cc;
  if (Math.abs(dr)+Math.abs(dc)!==1) return;

  const dir = dr===-1?'N': dr===1?'S': dc===-1?'W':'E';

  if (mazeWalls[cr][cc][dir]) {
    wrongMoves++; updateStats();
    speak({en:"That's a wall!",hi:'यह दीवार है!',gu:'આ દીવાલ છે!'});
    const {size} = DIFFS[difficulty];
    const idx = cr*size+cc;
    const cells = document.querySelectorAll('.maze-cell');
    cells[idx].classList.remove('shake');
    void cells[idx].offsetWidth;
    cells[idx].classList.add('shake');
    setTimeout(()=>cells[idx].classList.remove('shake'),350);
    return;
  }

  visitedSet.add(`${r},${c}`);
  currentPos={r,c}; stepCount++; updateStats(); renderMaze();

  if (r===DIFFS[difficulty].size-1 && c===DIFFS[difficulty].size-1) {
    gameWon=true;
    const p={en:'You made it! Great job!', hi:'वाह! बहुत अच्छा!', gu:'વાહ! બહુ સારું!'};
    speak(p); launchConfetti();
    setTimeout(()=>showCompletion('maze', wrongMoves, stepCount+wrongMoves), 900);
  }
}

document.addEventListener('DOMContentLoaded', () => { initLanguageSelector(); initGame(); });
</script>
</body>
</html>
