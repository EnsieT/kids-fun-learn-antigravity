<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Color By Number 🎮 Kids Fun Learn</title>
<meta name="description" content="Learn colors and numbers together by painting beautiful pictures. A creative activity for children aged 4-6."/>
<meta property="og:title" content="Color by Number 🎮 Kids Fun Learn"/>
<meta property="og:description" content="Learn colors and numbers together by painting beautiful pictures. A creative activity for children aged 4-6."/>
<meta property="og:type" content="website"/>
<link rel="stylesheet" href="../css/style.css"/>
<style>
  .cbn-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 8px;
  }
  .cbn-svg {
    max-width: 380px;
    width: 95vw;
    touch-action: manipulation;
  }
  .cbn-region {
    cursor: pointer;
    transition: filter 0.2s;
    stroke: #555;
    stroke-width: 2.5;
  }
  .cbn-region:hover { filter: brightness(1.12); }
  .cbn-region.correct-fill { stroke: #4CAF50; stroke-width: 4; }
  .color-palette {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    justify-content: center;
    padding: 10px 16px;
  }
  .palette-btn {
    width: 62px; height: 62px;
    border-radius: 50%;
    border: 5px solid transparent;
    cursor: pointer;
    font-size: 0.75rem;
    font-weight: 900;
    color: #fff;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    box-shadow: 0 3px 10px rgba(0,0,0,0.2);
    transition: transform 0.15s, border-color 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 2px;
  }
  .palette-btn:hover  { transform: scale(1.15); }
  .palette-btn.active { border-color: #333; transform: scale(1.2); box-shadow: 0 0 0 3px #333; }
  .palette-num { font-size: 1.2rem; line-height: 1; }
  .color-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    padding: 8px 16px;
    max-width: 500px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    background: #fff;
    border-radius: 50px;
    padding: 5px 13px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    font-weight: 800;
    font-size: 0.9rem;
  }
  .legend-swatch {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 2px solid rgba(0,0,0,0.15);
    font-size: 0.8rem;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; color: #fff;
    text-shadow: 1px 1px 1px rgba(0,0,0,0.4);
  }
  .scene-selector {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    padding: 8px;
  }
  .scene-btn {
    padding: 10px 20px;
    border-radius: 50px;
    border: 3px solid #ddd;
    background: #fff;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  }
  .scene-btn:hover   { border-color: #FF8C00; }
  .scene-btn.active  { border-color: #FF8C00; background: #FFF3E0; }
  .validate-btn {
    background: linear-gradient(135deg, #4CAF50, #2E7D32);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 14px 36px;
    font-size: 1.2rem;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(76,175,80,0.4);
    transition: transform 0.2s;
    margin: 8px;
  }
  .validate-btn:hover { transform: scale(1.06); }
</style>
<meta name="theme-color" content="#FFD700"/>
</head>
<body>
<canvas id="confetti-canvas" aria-hidden="true"></canvas>

<header class="activity-header">
  <button class="back-btn" onclick="goHome()" aria-label="Go Home" aria-label="Go Home">🏠</button>
  <h1>🎨 Color by Number</h1>
  <span class="score-display" id="score-display"></span>
</header>

<div id="langSelector" class="language-selector">
  <button class="lang-btn" data-lang="en">🇬🇧 En</button>
  <button class="lang-btn" data-lang="hi">🇮🇳 हि</button>
  <button class="lang-btn" data-lang="gu">🇮🇳 ગુ</button>
</div>

<div id="game-area">
  <!-- Scene Selector -->
  <div class="scene-selector">
    <button class="scene-btn active" onclick="loadScene(0,this)">🚜 Farm</button>
    <button class="scene-btn" onclick="loadScene(1,this)">🐠 Ocean</button>
    <button class="scene-btn" onclick="loadScene(2,this)">🚀 Space</button>
  </div>
  <div style="text-align:center; padding:4px 0">
    <button class="hear-btn" onclick="hearAgain()" aria-label="आवाज़ सुनो">🔊</button>
  </div>

  <!-- Color Legend -->
  <div class="color-legend" id="color-legend"></div>

  <!-- SVG Canvas -->
  <div class="cbn-wrap">
    <svg class="cbn-svg" id="cbn-svg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <!-- Palette -->
  <div class="color-palette" id="color-palette"></div>

  <div id="feedback-banner" class="feedback-banner"></div>

  <div style="text-align:center">
    <button class="validate-btn" onclick="validateColoring()">✅ Check My Art!</button>
  </div>
</div>

<div id="completion-screen" class="completion-screen">
  <div style="font-size:4rem">🎨🌈</div>
  <div class="completion-title" id="completion-title">रंग-बिरंगा! Colorful!</div>
  <div class="completion-score" id="completion-score"></div>
  <div class="completion-best"  id="completion-best"></div>
  <div class="completion-stars" id="completion-stars"></div>
  <button class="play-again-btn" onclick="restartCurrent()">🔄 Color Again</button>
  <br/><button class="play-again-btn" style="background:linear-gradient(135deg,#2196F3,#0D47A1);margin-top:12px" onclick="goHome()" aria-label="Go Home">🏠 Home</button>
</div>

<script src="../js/common.js"></script>
<script>
// Color map: number → {fill, name, hi, gu}
const COLORS = {
  1: {fill:'#F44336', name:'Red',    hi:'लाल',    gu:'લાલ'},
  2: {fill:'#2196F3', name:'Blue',   hi:'नीला',   gu:'વાદળી'},
  3: {fill:'#4CAF50', name:'Green',  hi:'हरा',    gu:'લીલો'},
  4: {fill:'#FFD700', name:'Yellow', hi:'पीला',   gu:'પીળો'},
  5: {fill:'#FF8C00', name:'Orange', hi:'नारंगी', gu:'નારંગી'},
  6: {fill:'#9C27B0', name:'Purple', hi:'बैंगनी', gu:'જાંબલી'},
  7: {fill:'#FF69B4', name:'Pink',   hi:'गुलाबी', gu:'ગુલાબી'},
};

// Scene definitions: array of SVG path defs with correct color numbers
const SCENES = [
  // 1: Sunny Farmville
  {
    name: 'Farm 🚜', colors: [1,2,3,4,5,6],
    regions: [
      {id:'sky', num:2, label:'Sky', path:'<rect id="sky" x="0" y="0" width="400" height="200" class="cbn-region" fill="#E0E0E0"/>'},
      {id:'sun', num:4, label:'Sun', path:'<circle id="sun" cx="330" cy="70" r="45" class="cbn-region" fill="#E0E0E0"/>'},
      {id:'cloud1', num:6, label:'Cloud1', path:'<ellipse id="cloud1" cx="100" cy="60" rx="40" ry="20" class="cbn-region" fill="#E0E0E0"/>'},
      {id:'cloud2', num:6, label:'Cloud2', path:'<ellipse id="cloud2" cx="220" cy="90" rx="50" ry="25" class="cbn-region" fill="#E0E0E0"/>'},
      {id:'grass', num:3, label:'Grass', path:'<rect id="grass" x="0" y="200" width="400" height="200" class="cbn-region" fill="#E0E0E0"/>'},
      {id:'house_w', num:1, label:'Wall', path:'<rect id="house_w" x="50" y="160" width="120" height="100" class="cbn-region" fill="#E0E0E0"/>'},
      {id:'house_r', num:5, label:'Roof', path:'<polygon id="house_r" points="110,90 30,160 190,160" class="cbn-region" fill="#E0E0E0"/>'},
      {id:'house_d', num:6, label:'Door', path:'<rect id="house_d" x="90" y="200" width="40" height="60" rx="4" class="cbn-region" fill="#E0E0E0"/>'},
      {id:'tractor_b', num:1, label:'Tractor', path:'<rect id="tractor_b" x="220" y="240" width="100" height="50" rx="8" class="cbn-region" fill="#E0E0E0"/>'},
      {id:'tractor_c', num:5, label:'Cab', path:'<rect id="tractor_c" x="270" y="190" width="50" height="50" rx="4" class="cbn-region" fill="#E0E0E0"/>'},
      {id:'wheel_b', num:6, label:'Wheel1', path:'<circle id="wheel_b" cx="300" cy="290" r="25" class="cbn-region" fill="#E0E0E0"/>'},
      {id:'wheel_s', num:6, label:'Wheel2', path:'<circle id="wheel_s" cx="240" cy="300" r="15" class="cbn-region" fill="#E0E0E0"/>'}
    ]
  },
  // 2: Under the Sea
  {
    name: 'Ocean 🐠', colors: [2,3,4,5,7,1],
    regions: [
      {id:'water', num:2, label:'Water', path:'<rect id="water" x="0" y="0" width="400" height="320" class="cbn-region" fill="#E0E0E0"/>'},
      {id:'sand', num:4, label:'Sand', path:'<ellipse id="sand" cx="200" cy="360" rx="250" ry="60" class="cbn-region" fill="#E0E0E0"/>'},
      {id:'sub_b', num:4, label:'Sub Base', path:'<ellipse id="sub_b" cx="200" cy="180" rx="80" ry="40" class="cbn-region" fill="#E0E0E0"/>'},
      {id:'sub_t', num:5, label:'Sub Top', path:'<rect id="sub_t" x="170" y="120" width="40" height="40" rx="5" class="cbn-region" fill="#E0E0E0"/>'},
      {id:'sub_w1', num:2, label:'Win1', path:'<circle id="sub_w1" cx="160" cy="180" r="15" class="cbn-region" fill="#E0E0E0"/>'},
      {id:'sub_w2', num:2, label:'Win2', path:'<circle id="sub_w2" cx="200" cy="180" r="15" class="cbn-region" fill="#E0E0E0"/>'},
      {id:'sub_w3', num:2, label:'Win3', path:'<circle id="sub_w3" cx="240" cy="180" r="15" class="cbn-region" fill="#E0E0E0"/>'},
      {id:'fish1', num:5, label:'Fish1', path:'<ellipse id="fish1" cx="80" cy="100" rx="25" ry="15" class="cbn-region" fill="#E0E0E0"/>'},
      {id:'fish1t', num:1, label:'Tail1', path:'<polygon id="fish1t" points="55,100 35,85 35,115" class="cbn-region" fill="#E0E0E0"/>'},
      {id:'fish2', num:7, label:'Fish2', path:'<ellipse id="fish2" cx="320" cy="240" rx="20" ry="12" class="cbn-region" fill="#E0E0E0"/>'},
      {id:'weed1', num:3, label:'Weed', path:'<path id="weed1" d="M 60 400 Q 70 300 50 250 Q 30 200 60 150" class="cbn-region" fill="none" stroke="#E0E0E0" stroke-width="12"/>'},
      {id:'weed2', num:3, label:'Weed', path:'<path id="weed2" d="M 350 400 Q 330 300 350 250 Q 360 200 330 160" class="cbn-region" fill="none" stroke="#E0E0E0" stroke-width="12"/>'}
    ]
  },
  // 3: Space Adventure
  {
    name: 'Space 🚀', colors: [6,2,4,1,3,7],
    regions: [
      {id:'space', num:6, label:'Space Base', path:'<rect id="space" x="0" y="0" width="400" height="400" class="cbn-region" fill="#E0E0E0"/>'},
      {id:'planet1', num:4, label:'Planet1', path:'<circle id="planet1" cx="80" cy="90" r="50" class="cbn-region" fill="#E0E0E0"/>'},
      {id:'ring1', num:3, label:'Ring', path:'<ellipse id="ring1" cx="80" cy="90" rx="80" ry="15" class="cbn-region" fill="#E0E0E0" transform="rotate(20 80 90)"/>'},
      {id:'moon', num:2, label:'Moon', path:'<circle id="moon" cx="300" cy="300" r="70" class="cbn-region" fill="#E0E0E0"/>'},
      {id:'crater1', num:6, label:'Crater1', path:'<circle id="crater1" cx="280" cy="280" r="15" class="cbn-region" fill="#E0E0E0"/>'},
      {id:'crater2', num:6, label:'Crater2', path:'<circle id="crater2" cx="330" cy="320" r="10" class="cbn-region" fill="#E0E0E0"/>'},
      {id:'rocket_b', num:1, label:'Rocket Base', path:'<polygon id="rocket_b" points="200,100 170,220 230,220" class="cbn-region" fill="#E0E0E0"/>'},
      {id:'rocket_w', num:2, label:'Window', path:'<circle id="rocket_w" cx="200" cy="160" r="12" class="cbn-region" fill="#E0E0E0"/>'},
      {id:'rocket_f1', num:7, label:'Fin1', path:'<polygon id="rocket_f1" points="170,220 150,250 180,220" class="cbn-region" fill="#E0E0E0"/>'},
      {id:'rocket_f2', num:7, label:'Fin2', path:'<polygon id="rocket_f2" points="230,220 250,250 220,220" class="cbn-region" fill="#E0E0E0"/>'},
      {id:'flame', num:4, label:'Flame', path:'<polygon id="flame" points="180,220 220,220 200,280" class="cbn-region" fill="#E0E0E0"/>'},
      {id:'star1', num:4, label:'Star', path:'<circle id="star1" cx="350" cy="50" r="6" class="cbn-region" fill="#E0E0E0"/>'},
      {id:'star2', num:4, label:'Star', path:'<circle id="star2" cx="50" cy="300" r="5" class="cbn-region" fill="#E0E0E0"/>'}
    ]
  }
];

let currentScene = 0;
let selectedColor = 1;
let painted = {};  // regionId → colorNum
const currentPrompt = {en: 'Fill the colors!', hi: 'रंग भरो!', gu: 'રંગ ભરો!'};

function hearAgain() { speak(currentPrompt); }

function onLanguageChange() { loadScene(currentScene, document.querySelectorAll('.scene-btn')[currentScene]); }

function loadScene(idx, btnEl) {
  currentScene = idx;
  painted = {};
  document.querySelectorAll('.scene-btn').forEach(b => b.classList.remove('active'));
  if (btnEl) btnEl.classList.add('active');

  document.getElementById('completion-screen').classList.remove('show');
  document.getElementById('game-area').classList.remove('hidden');
  hideFeedback();

  const scene = SCENES[idx];
  renderLegend(scene.colors);
  renderPalette(scene.colors);
  renderSVG(scene);
  // Select first color by default
  selectedColor = scene.colors[0];
  document.querySelectorAll('.palette-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.num) === selectedColor);
  });
  speak(currentPrompt);
}

function renderLegend(colorNums) {
  const leg = document.getElementById('color-legend');
  leg.innerHTML = colorNums.map(n => {
    const c = COLORS[n];
    return `<div class="legend-item">
      <div class="legend-swatch" style="background:${c.fill}">${n}</div>
      <span>${n} = ${t({en:c.name, hi:c.hi, gu:c.gu})}</span>
    </div>`;
  }).join('');
}

function renderPalette(colorNums) {
  const pal = document.getElementById('color-palette');
  pal.innerHTML = colorNums.map(n => {
    const c = COLORS[n];
    return `<button class="palette-btn" data-num="${n}" style="background:${c.fill}"
              onclick="selectColor(${n}, this)">
              <span class="palette-num">${n}</span>
              <span style="font-size:0.6rem">${t({en:c.name, hi:c.hi, gu:c.gu})}</span>
            </button>`;
  }).join('');
}

function selectColor(num, btn) {
  selectedColor = num;
  document.querySelectorAll('.palette-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const c = COLORS[num];
  if (c) speak({en: c.name, hi: c.hi, gu: c.gu});
}

function renderSVG(scene) {
  const svg = document.getElementById('cbn-svg');
  svg.innerHTML = scene.regions.map(r => r.path).join('\n');

  // Attach click handlers
  scene.regions.forEach(r => {
    const el = document.getElementById(r.id);
    if (el) {
      el.addEventListener('click', () => paintRegion(r.id, r.num));
      // Add number label
      const bbox = el.getBBox ? el.getBBox() : null;
    }
  });
}

function paintRegion(regionId, correctNum) {
  const el = document.getElementById(regionId);
  if (!el) return;
  const color = COLORS[selectedColor];
  el.setAttribute('fill', color.fill);
  painted[regionId] = selectedColor;
}

function validateColoring() {
  const scene = SCENES[currentScene];
  let wrong = 0, correct = 0, total = scene.regions.length;

  scene.regions.forEach(r => {
    const el = document.getElementById(r.id);
    if (painted[r.id] === r.num) {
      correct++;
      if (el) el.classList.add('correct-fill');
    } else {
      wrong++;
      if (el) el.setAttribute('fill', '#E0E0E0');
    }
  });

  if (wrong === 0) {
    launchConfetti();
    speak({en: 'Well done! Beautiful coloring!', hi: 'शाबाश! वाह! बहुत सुंदर रंग भरे!', gu: 'શાબાશ! વાહ! ખૂબ સુંદર રંગ ભર્યા!'});
    setTimeout(() => {
      const stars = calcStars(0);
      saveBestScore('color-by-number', stars);
      const best = getBestScore('color-by-number');
      document.getElementById('game-area').classList.add('hidden');
      const cs = document.getElementById('completion-screen');
      cs.classList.add('show');
      document.getElementById('completion-title').textContent = '🎨 वाह! Beautiful!';
      document.getElementById('completion-score').textContent = `All ${total} regions colored correctly!`;
      document.getElementById('completion-best').textContent = `Best: ${starsHTML(best)}`;
      document.getElementById('completion-stars').textContent = starsHTML(stars);
    }, 600);
  } else {
    const banner = document.getElementById('feedback-banner');
    banner.textContent = `❌ ${wrong} region${wrong > 1 ? 's' : ''} need fixing. फिर से कोशिश करो!`;
    banner.classList.remove('show', 'correct-fb', 'wrong-fb');
    void banner.offsetWidth;
    banner.classList.add('show', 'wrong-fb');
  }
}

function restartCurrent() {
  loadScene(currentScene, document.querySelectorAll('.scene-btn')[currentScene]);
}

document.addEventListener('DOMContentLoaded', () => { initLanguageSelector(); loadScene(0, document.querySelector('.scene-btn.active')); });
</script>
</body>
</html>
