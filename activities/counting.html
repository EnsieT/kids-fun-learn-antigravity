<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Counting Game 🔢 · Kids Fun Learn</title>
<link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<canvas id="confetti-canvas"></canvas>

<header class="activity-header">
  <button class="back-btn" onclick="goHome()" aria-label="Go Home">🏠</button>
  <h1>🔢 Counting Game</h1>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill"></div></div>
  <span class="score-display" id="score-display">0/10</span>
</header>

<div id="langSelector" class="language-selector">
  <button class="lang-btn" data-lang="en">🇬🇧 En</button>
  <button class="lang-btn" data-lang="hi">🇮🇳 हि</button>
  <button class="lang-btn" data-lang="gu">🇮🇳 ગુ</button>
</div>

<div id="game-area">
  <div class="question-area">
    <p class="question-text" id="question-text">How many do you see?</p>
    <button class="hear-btn" onclick="hearAgain()" aria-label="आवाज़ सुनो">🔊</button>
    <div class="question-emoji-display" id="emoji-display"></div>
  </div>

  <div id="feedback-banner" class="feedback-banner"></div>

  <div class="choices-grid" id="choices-grid"></div>
</div>

<!-- Completion Screen -->
<div id="completion-screen" class="completion-screen">
  <div class="completion-stars" id="completion-stars">⭐⭐⭐</div>
  <div class="completion-title" id="completion-title">शानदार! Excellent!</div>
  <div class="completion-score" id="completion-score"></div>
  <div class="completion-best"  id="completion-best"></div>
  <button class="play-again-btn" onclick="initGame()" id="play-again-btn">🔄 Play Again</button>
</div>

<script src="../js/common.js"></script>
<script>
const OBJECTS = [
  {emoji: '🥭', name: 'Mango',    hi: 'आम',    gu: 'કેરી'},
  {emoji: '🍌', name: 'Banana',   hi: 'केला',  gu: 'કેળું'},
  {emoji: '🥥', name: 'Coconut',  hi: 'नारियल',gu: 'નાળિયેર'},
  {emoji: '🍎', name: 'Apple',    hi: 'सेब',   gu: 'સફરજન'},
  {emoji: '🌸', name: 'Flower',   hi: 'फूल',   gu: 'ફૂલ'},
  {emoji: '⭐', name: 'Star',     hi: 'तारा',  gu: 'તારો'},
  {emoji: '🪔', name: 'Diya',     hi: 'दिया',  gu: 'દીવો'},
  {emoji: '🍬', name: 'Candy',    hi: 'टॉफ़ी', gu: 'ટૉફી'},
  {emoji: '🐘', name: 'Elephant', hi: 'हाथी',  gu: 'હાથી'},
  {emoji: '🦚', name: 'Peacock',  hi: 'मोर',   gu: 'મોર'},
];

const TOTAL_ROUNDS = 10;
let round = 0;
let mistakes = 0;
let answered = false;
let correctAnswer = 0;
let currentPrompt = {};

function hearAgain() { speak(currentPrompt); }

function onLanguageChange() { initGame(); }

function initGame() {
  round = 0; mistakes = 0; answered = false;
  document.getElementById('completion-screen').classList.remove('show');
  document.getElementById('game-area').classList.remove('hidden');
  document.getElementById('play-again-btn').textContent =
    t({en: '🔄 Play Again', hi: '🔄 फिर से खेलो', gu: '🔄 ફરી રમો'});
  hideFeedback();
  nextRound();
}

function nextRound() {
  if (round >= TOTAL_ROUNDS) { showCompletion('counting', mistakes, TOTAL_ROUNDS); return; }
  answered = false;
  hideFeedback();
  updateProgress(round, TOTAL_ROUNDS);

  const obj = OBJECTS[Math.floor(Math.random() * OBJECTS.length)];
  const count = 1 + Math.floor(Math.random() * 9); // 1–9
  correctAnswer = count;

  document.getElementById('emoji-display').textContent = obj.emoji.repeat(count);
  document.getElementById('question-text').textContent =
    t({en: `How many ${obj.name}s?`, hi: `कितने ${obj.hi} हैं?`, gu: `કેટલા ${obj.gu} છે?`});

  currentPrompt = {en: `How many ${obj.name}s? Count them!`, hi: 'कितने ' + obj.hi + ' हैं? गिनो!', gu: 'કેટલા ' + obj.gu + ' છે? ગણો!'};
  speak(currentPrompt);

  // Generate choices: correct + 3 wrong
  const wrong = new Set();
  while (wrong.size < 3) {
    const n = 1 + Math.floor(Math.random() * 9);
    if (n !== count) wrong.add(n);
  }
  const choices = shuffle([count, ...wrong]);

  const grid = document.getElementById('choices-grid');
  grid.innerHTML = '';
  choices.forEach(n => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = n;
    btn.onclick = () => handleChoice(btn, n);
    grid.appendChild(btn);
  });
}

function handleChoice(btn, value) {
  if (answered) return;
  if (value === correctAnswer) {
    answered = true;
    btn.classList.add('correct');
    showFeedback(true);
    round++;
    setTimeout(() => { btn.classList.remove('correct'); nextRound(); }, 1500);
  } else {
    mistakes++;
    btn.classList.add('wrong');
    showFeedback(false);
    setTimeout(() => btn.classList.remove('wrong'), 600);
  }
}

document.addEventListener('DOMContentLoaded', () => { initLanguageSelector(); initGame(); });
</script>
</body>
</html>
