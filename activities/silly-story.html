<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Silly Story Machine</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4CAF50">
  <meta name="description" content="Build fun and silly sentences to hear them read out loud! Perfect for early reading comprehension.">
  <meta property="og:title" content="Silly Story Machine - Kids Fun Learn">
  <meta property="og:description" content="Build fun and silly sentences to hear them read out loud! Perfect for early reading comprehension.">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .story-machine {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-top: 20px;
    }
    
    .slot-machine {
      display: flex;
      gap: 15px;
      background: white;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 800px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .slot-column {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 200px;
    }

    .slot-title {
      font-size: 1.2rem;
      font-weight: bold;
      color: #666;
    }

    .slot-window {
      width: 100%;
      height: 150px;
      background: #f0f8ff;
      border: 4px solid #4CAF50;
      border-radius: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 5px 10px rgba(0,0,0,0.05);
      transition: all 0.3s;
    }

    .slot-emoji {
      font-size: 4rem;
      filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.2));
      transition: transform 0.3s;
    }

    .slot-text {
      font-size: 1.2rem;
      font-weight: bold;
      color: #333;
      margin-top: 10px;
      text-align: center;
    }

    .shuffle-btn {
      background: #FF9800;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 1.1rem;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      transition: all 0.2s;
    }
    .shuffle-btn:hover { background: #F57C00; transform: translateY(-2px); }
    .shuffle-btn:active { transform: translateY(2px); }

    .controls {
      display: flex;
      gap: 20px;
      margin-top: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .main-btn {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 15px 40px;
      border-radius: 30px;
      font-size: 1.5rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 6px 12px rgba(76, 175, 80, 0.3);
      display: flex;
      align-items: center;
      gap: 10px;
      transition: transform 0.2s;
    }
    .main-btn:hover { background: #43A047; transform: translateY(-3px) scale(1.05); }

    .read-btn { background: #2196F3; box-shadow: 0 6px 12px rgba(33, 150, 243, 0.3); }
    .read-btn:hover { background: #1E88E5; }

    @keyframes spinSlot {
      0% { transform: translateY(-100%); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(0); }
    }
    
    .spinning > * { animation: spinSlot 0.3s ease-out; }

  </style>
</head>
<body>

<a href="#main-content" class="skip-link">Skip to main content</a>

<div class="header">
  <button class="back-btn" onclick="location.href='../index.html'">⬅️ Back</button>
  <div class="lang-selector">
    <button onclick="setLang('hi')">हिंदी</button>
    <button onclick="setLang('en')">English</button>
    <button onclick="setLang('gu')">ગુજરાતી</button>
  </div>
</div>

<div class="container" id="main-content">
  <div class="title" data-hi="😂 मज़ेदार कहानी मशीन" data-en="😂 Silly Story Machine" data-gu="😂 રમુજી વાર્તા મશીન">😂 Silly Story Machine</div>

  <div class="story-machine">
    <div class="slot-machine">
      
      <!-- Character Slot -->
      <div class="slot-column">
        <div class="slot-title" data-hi="कौन?" data-en="Who?" data-gu="કોણ?">Who?</div>
        <div class="slot-window" id="slot-who">
          <div class="slot-emoji" id="emoji-who">🐒</div>
          <div class="slot-text" id="text-who">A Monkey</div>
        </div>
        <button class="shuffle-btn" onclick="spinSlot('who')">🎲 <span data-hi="बदलो" data-en="Spin" data-gu="બદલો">Spin</span></button>
      </div>

      <!-- Action Slot -->
      <div class="slot-column">
        <div class="slot-title" data-hi="क्या कर रहा है?" data-en="Doing What?" data-gu="શું કરે છે?">Doing What?</div>
        <div class="slot-window" id="slot-action">
          <div class="slot-emoji" id="emoji-action">💃</div>
          <div class="slot-text" id="text-action">is dancing</div>
        </div>
        <button class="shuffle-btn" onclick="spinSlot('action')">🎲 <span data-hi="बदलो" data-en="Spin" data-gu="બદલો">Spin</span></button>
      </div>

      <!-- Location Slot -->
      <div class="slot-column">
        <div class="slot-title" data-hi="कहाँ?" data-en="Where?" data-gu="ક્યાં?">Where?</div>
        <div class="slot-window" id="slot-where">
          <div class="slot-emoji" id="emoji-where">🌙</div>
          <div class="slot-text" id="text-where">on the Moon</div>
        </div>
        <button class="shuffle-btn" onclick="spinSlot('where')">🎲 <span data-hi="बदलो" data-en="Spin" data-gu="બદલો">Spin</span></button>
      </div>

    </div>

    <div class="controls">
      <button class="main-btn shuffle-btn" onclick="spinAll()">🌪️ <span data-hi="सब बदलो" data-en="Spin All" data-gu="બધા બદલો">Spin All</span></button>
      <button class="main-btn read-btn" onclick="readStory()">🔊 <span data-hi="कहानी सुनो" data-en="Read Story" data-gu="વાર્તા સાંભળો">Read Story</span></button>
    </div>
  </div>
</div>

<script src="../js/common.js"></script>
<script>
window.playSound = function() {};
const banks = {
  who: [
    { emoji: '🐒', en: 'A monkey', hi: 'एक बंदर', gu: 'એક વાંદરો' },
    { emoji: '🤖', en: 'A robot', hi: 'एक रोबोट', gu: 'એક રોબોટ' },
    { emoji: '🏴‍☠️', en: 'A pirate', hi: 'एक समुद्री डाकू', gu: 'એક ચાંચિયો' },
    { emoji: '👽', en: 'An alien', hi: 'एक जादूगर', gu: 'એક જાદુગર' },
    { emoji: '🐕', en: 'A dog', hi: 'एक कुत्ता', gu: 'એક કૂતરો' },
    { emoji: '🦖', en: 'A dinosaur', hi: 'एक डायनासोर', gu: 'એક ડાયનાસોર' },
    { emoji: '🐱', en: 'A cat', hi: 'एक बिल्ली', gu: 'એક બિલાડી' },
    { emoji: '🐷', en: 'A pig', hi: 'एक सुअर', gu: 'એક ડુક્કર' }
  ],
  action: [
    { emoji: '💃', en: 'is dancing', hi: 'नाच रहा है', gu: 'નાચી રહ્યો છે' },
    { emoji: '🛌', en: 'is sleeping', hi: 'सो रहा है', gu: 'સૂતો છે' },
    { emoji: '🍕', en: 'is eating pizza', hi: 'पिज्जा खा रहा है', gu: 'પિઝા ખાઈ રહ્યો છે' },
    { emoji: '🚲', en: 'is riding a bike', hi: 'साइकिल चला रहा है', gu: 'સાયકલ ચલાવી રહ્યો છે' },
    { emoji: '🏊‍♂️', en: 'is swimming', hi: 'तैर रहा है', gu: 'તરી રહ્યો છે' },
    { emoji: '🎸', en: 'is playing guitar', hi: 'गिटार बजा रहा है', gu: 'ગિટાર વગાડી રહ્યો છે' },
    { emoji: '📚', en: 'is reading a book', hi: 'किताब पढ़ रहा है', gu: 'ચોપડી વાંચી રહ્યો છે' },
    { emoji: '🍦', en: 'is eating icecream', hi: 'आइसक्रीम खा रहा है', gu: 'આઈસ્ક્રીમ ખાઈ રહ્યો છે' }
  ],
  where: [
    { emoji: '🌙', en: 'on the moon', hi: 'चांद पर', gu: 'ચંદ્ર પર' },
    { emoji: '🌴', en: 'in the jungle', hi: 'जंगल में', gu: 'જંગલમાં' },
    { emoji: '🏫', en: 'at school', hi: 'स्कूल में', gu: 'શાળામાં' },
    { emoji: '🏰', en: 'in a castle', hi: 'महल में', gu: 'મહેલમાં' },
    { emoji: '🚀', en: 'in a spaceship', hi: 'अंतरिक्ष यान में', gu: 'અવકાશયાન માં' },
    { emoji: '🏖️', en: 'at the beach', hi: 'समुद्र तट पर', gu: 'દરિયાકિનારે' },
    { emoji: '🛁', en: 'in the bathtub', hi: 'बाथटब में', gu: 'બાથટબમાં' },
    { emoji: '🏢', en: 'on the roof', hi: 'छत पर', gu: 'છત પર' }
  ]
};

let currentStory = { who: 0, action: 0, where: 0 };

function getRandomIndex(max) {
  return Math.floor(Math.random() * max);
}

function updateSlotDisplay(type) {
  const item = banks[type][currentStory[type]];
  const slotWindow = document.getElementById(`slot-${type}`);
  
  // Trigger animation
  slotWindow.classList.remove('spinning');
  void slotWindow.offsetWidth; // trigger reflow
  slotWindow.classList.add('spinning');
  
  document.getElementById(`emoji-${type}`).innerText = item.emoji;
  document.getElementById(`text-${type}`).innerText = item[currentLang];
}

function spinSlot(type) {
  playSound('pop');
  currentStory[type] = getRandomIndex(banks[type].length);
  updateSlotDisplay(type);
}

function spinAll() {
  playSound('pop');
  currentStory.who = getRandomIndex(banks['who'].length);
  currentStory.action = getRandomIndex(banks.action.length);
  currentStory.where = getRandomIndex(banks.where.length);
  
  updateSlotDisplay('who');
  setTimeout(() => updateSlotDisplay('action'), 150);
  setTimeout(() => updateSlotDisplay('where'), 300);
}

function readStory() {
  const cWho = banks.who[currentStory.who][currentLang];
  const cAct = banks.action[currentStory.action][currentLang];
  const cWhere = banks.where[currentStory.where][currentLang];
  
  const sentence = `${cWho} ${cAct} ${cWhere}.`;
  speak(sentence);
  
  // Add a fun jump animation to all emojis
  ['who', 'action', 'where'].forEach(type => {
    const el = document.getElementById(`emoji-${type}`);
    el.style.transform = 'translateY(-20px) scale(1.2)';
    setTimeout(() => el.style.transform = 'none', 300);
  });
}

// Override setLang to update text when language changes
const originalSetLang = setLang;
window.setLang = function(lang) {
  originalSetLang(lang);
  updateSlotDisplay('who');
  updateSlotDisplay('action');
  updateSlotDisplay('where');
};

// Initialize
spinAll();
</script>
</body>
</html>
