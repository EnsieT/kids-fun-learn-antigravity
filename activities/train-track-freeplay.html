<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Train Sandbox 🚂 Kids Fun Learn</title>
<meta name="description" content="Build your own continuous train track! Place rails on a 10x10 grid and unleash the train to test if your design holds up."/>
<link rel="stylesheet" href="../css/style.css"/>
<style>

.game-container {
  display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
  padding: 10px; box-sizing: border-box; touch-action: manipulation;
}
.sandbox-grid {
  display: grid;
  grid-template-columns: repeat(10, 45px); /* 10x10 */
  grid-template-rows: repeat(10, 45px);
  gap: 0;
  background: #795548; /* Dirt background */
  border: 4px solid #4CAF50;
  border-radius: 8px;
  position: relative;
  overflow: hidden;
}
.cell {
  width: 45px; height: 45px;
  background-color: #8BC34A; /* Grass */
  border: 1px dashed rgba(255,255,255,0.3);
  box-sizing: border-box;
  display: flex; align-items: center; justify-content: center;
  position: relative;
  touch-action: none;
}
.cell.error { background-color: #F44336; } /* highlight bad connections */
.cell.start-cell { background-color: #8D6E63; } /* Factory */

.track-start { background: #8D6E63; font-size: 28px; display:flex; align-items:center; justify-content:center; }
.track-start::after { content: "🏭"; }
.toolbox {
  display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
  margin-top: 15px; padding: 10px; background: #E0E0E0; border-radius: 12px;
  box-shadow: inset 0 3px 6px rgba(0,0,0,0.1); width: 100%; max-width: 450px;
}
.tool-item {
  width: 45px; height: 45px; background: #fff; border: 2px solid transparent;
  border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: transform 0.1s;
}
.tool-item.selected { border-color: #FFA000; background: #FFECB3; transform: scale(1.1); box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
.eraser-tool { font-size: 24px; }
.action-buttons { margin-top: 20px; display: flex; gap: 15px; }

/* The Train */
#train {
  position: absolute; width: 45px; height: 45px; font-size: 32px;
  display: flex; align-items: center; justify-content: center;
  z-index: 50; transition: transform 0.4s linear; display: none;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
}
.smoke { position:absolute; top:-10px; font-size:16px; animation: floatUp 1s infinite alternate; }
@keyframes floatUp { 0% { transform:translateY(0) scale(0.8); opacity:0.8; } 100% { transform:translateY(-15px) scale(1.2); opacity:0; } }
</style>
</head>
<body>
<header class="activity-header">
  <button class="back-btn" onclick="window.location.href='../index.html'">🏠</button>
  <h1>🏗️ Sandbox Train Track</h1>
</header>
<div id="langSelector" class="language-selector">
  <button class="lang-btn" data-lang="en">🇬🇧 En</button>
  <button class="lang-btn" data-lang="hi">🇮🇳 हि</button>
  <button class="lang-btn" data-lang="gu">🇮🇳 ગુ</button>
</div>

<div class="game-container" id="game-area">
  <div class="title" style="margin-bottom:10px; text-align:center;" data-hi="अपना रेलवे ट्रैक बनाओ!" data-en="Design a huge train track!" data-gu="તમારો પોતાનો રેલમાર્ગ બનાવો!">Design a huge train track!</div>
  
  <div class="sandbox-grid" id="sandbox-grid">
    <div id="train">🚂<div class="smoke">☁️</div></div>
  </div>
  
  <div class="toolbox" id="toolbox">
    <div class="tool-item track track-start selected" data-tool="start" onclick="selectTool(this)"></div>
    <div class="tool-item track track-h" data-tool="h" onclick="selectTool(this)"></div>
    <div class="tool-item track track-v" data-tool="v" onclick="selectTool(this)"></div>
    <div class="tool-item track track-br" data-tool="br" onclick="selectTool(this)"></div>
    <div class="tool-item track track-bl" data-tool="bl" onclick="selectTool(this)"></div>
    <div class="tool-item track track-tr" data-tool="tr" onclick="selectTool(this)"></div>
    <div class="tool-item track track-tl" data-tool="tl" onclick="selectTool(this)"></div>
    <div class="tool-item eraser-tool" data-tool="erase" onclick="selectTool(this)">🧹</div>
  </div>
  
  <div class="action-buttons">
    <button class="controls-btn" style="background:#f44336;" onclick="stopTrain()">🛑 Stop</button>
    <button class="controls-btn" id="run-btn" style="background:#4CAF50;" onclick="runTrain()">▶️ Go!</button>
  </div>
</div>

<script src="../js/common.js"></script>
<script>
let activeTool = 'start';
let isRunning = false;
let moveTimeout = null;
let gridData = Array(10).fill(null).map(()=>Array(10).fill('none')); // 10x10 state
const startPos = {r: 4, c: 4}; // Default start
gridData[4][4] = 'start'; // prepopulate start

function initSandbox() {
  const grid = document.getElementById('sandbox-grid');
  // clear cells
  const oldCells = document.querySelectorAll('.cell');
  oldCells.forEach(c => c.remove());
  
  for (let r=0; r<10; r++) {
    for (let c=0; c<10; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.r = r; cell.dataset.c = c;
      cell.id = `cell-${r}-${c}`;
      cell.addEventListener('pointerdown', (e) => applyTool(e, r, c));
      cell.addEventListener('pointerenter', (e) => {
        if(e.buttons === 1) applyTool(e, r, c); // Draw routing drag
      });
      
      // render initial
      if(gridData[r][c] !== 'none') {
        const div = document.createElement('div');
        div.className = `track track-${gridData[r][c]}`;
        cell.appendChild(div);
      }
      grid.appendChild(cell);
    }
  }
}

function selectTool(element) {
  document.querySelectorAll('.tool-item').forEach(el => el.classList.remove('selected'));
  element.classList.add('selected');
  activeTool = element.dataset.tool;
  playSound('pop');
}

function applyTool(e, r, c) {
  if (isRunning) return; // Prevent painting while train runs
  
  // Rule: Only one start point
  if (activeTool === 'start') {
    // Clear old start
    for(let rr=0; rr<10; rr++) {
      for(let cc=0; cc<10; cc++) {
        if (gridData[rr][cc] === 'start') {
          gridData[rr][cc] = 'none';
          document.getElementById(`cell-${rr}-${cc}`).innerHTML = '';
        }
      }
    }
  }
  
  gridData[r][c] = (activeTool === 'erase') ? 'none' : activeTool;
  const cell = document.getElementById(`cell-${r}-${c}`);
  cell.innerHTML = '';
  cell.classList.remove('error');
  
  if (activeTool !== 'erase') {
    const div = document.createElement('div');
    div.className = `track track-${activeTool}`;
    cell.appendChild(div);
  }
}

// Map the physical ports of each rail
const PORTS = {
  'h': ['Left', 'Right'], 'v': ['Up', 'Down'], 'tr': ['Up', 'Right'],
  'tl': ['Up', 'Left'], 'br': ['Down', 'Right'], 'bl': ['Down', 'Left'],
  'start': ['Right', 'Left', 'Up', 'Down'] // start naturally exports anything
};

const OPPOSITE = {'Left': 'Right', 'Right': 'Left', 'Up': 'Down', 'Down': 'Up'};
const DIRS = {'Left': {dr: 0, dc: -1}, 'Right': {dr: 0, dc: 1}, 'Up': {dr: -1, dc: 0}, 'Down': {dr: 1, dc: 0}};

let chugInterval;
function startTrainSound() {
  try {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    let chugCount = 0;
    if (chugInterval) clearInterval(chugInterval);
    chugInterval = setInterval(() => {
      let volume = chugCount % 4 === 0 ? 0.3 : 0.1;
      chugCount++;
      const bufferSize = audioCtx.sampleRate * 0.1;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i=0; i<bufferSize; i++) data[i] = Math.random() * 2 - 1;
      const noise = audioCtx.createBufferSource(); noise.buffer = buffer;
      const filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 500;
      const gainNode = audioCtx.createGain(); gainNode.gain.setValueAtTime(volume, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      noise.connect(filter); filter.connect(gainNode); gainNode.connect(audioCtx.destination);
      noise.start();
    }, 250);
  } catch(e) {}
}

function stopTrainSound() { if (chugInterval) clearInterval(chugInterval); }

function stopTrain() {
  isRunning = false;
  document.getElementById('train').style.display = 'none';
  clearTimeout(moveTimeout);
  stopTrainSound();
  document.getElementById('run-btn').style.display = 'block';
  // Clear error hues
  document.querySelectorAll('.cell.error').forEach(c => c.classList.remove('error'));
}

async function runTrain() {
  if (isRunning) return;
  // Locate Start Node
  let sr = -1, sc = -1;
  for(let r=0; r<10; r++) { for(let c=0; c<10; c++) { if (gridData[r][c] === 'start') { sr = r; sc = c; } } }
  if (sr === -1) { speak({en: 'Place a start station first!', hi: 'पहले स्टेशन लगाओ!', gu: 'પહેલા સ્ટેશન મૂકો!'}); return; }
  
  isRunning = true;
  document.getElementById('run-btn').style.display = 'none';
  document.querySelectorAll('.cell.error').forEach(c => c.classList.remove('error'));
  
  const train = document.getElementById('train');
  train.style.display = 'flex';
  train.style.transform = `translate(${sc * 45}px, ${sr * 45}px)`; // 45px sizing
  
  playSound('pop'); startTrainSound();
  
  // Determine initial launch direction (find first neighbor that connects)
  let curPos = {r: sr, c: sc};
  let curDir = null; // What vector we ARE facing/moving
  
  // Quick scan out of START
  for (let d of ['Right', 'Left', 'Bottom', 'Top']) {
    let checkDir = d; if (d==='Top') checkDir='Up'; if(d==='Bottom') checkDir='Down';
    let nr = sr + DIRS[checkDir].dr, nc = sc + DIRS[checkDir].dc;
    if (nr>=0 && nr<10 && nc>=0 && nc<10) {
      let neighborType = gridData[nr][nc];
      if (neighborType !== 'none' && neighborType !== 'start') {
        if (PORTS[neighborType].includes(OPPOSITE[checkDir])) {
           curDir = checkDir; break;
        }
      }
    }
  }
  
  if (!curDir) {
    // Derail immediately
    derail(sr, sc, 'No track connected!');
    return;
  }
  
  // The crawler engine
  async function crawl() {
    if (!isRunning) return;
    let nextR = curPos.r + DIRS[curDir].dr;
    let nextC = curPos.c + DIRS[curDir].dc;
    
    // Bounds check
    if (nextR < 0 || nextR >= 10 || nextC < 0 || nextC >= 10) { derail(curPos.r, curPos.c, 'Fell off map!'); return; }
    
    let destType = gridData[nextR][nextC];
    if (destType === 'none') { derail(nextR, nextC, 'Track broke!'); return; }
    if (destType === 'start') { speak({en:'Yay! A loop!', hi:'लूप्!', gu:'લૂપ!'}); stopTrain(); launchConfetti(); return; } // Complete loop!
    
    // Validate the destination can accept our movement vector (we enter its opposite port)
    let inPort = OPPOSITE[curDir];
    if (!PORTS[destType].includes(inPort)) { derail(nextR, nextC, 'Crash!'); return; }
    
    // Move train visually
    train.style.transform = `translate(${nextC * 45}px, ${nextR * 45}px)`;
    curPos = {r: nextR, c: nextC};
    
    // Calculate new exit vector
    let outPort = PORTS[destType].find(p => p !== inPort);
    curDir = outPort; // our new travel trajectory
    
    moveTimeout = setTimeout(crawl, 400); // 400ms speed
  }
  
  moveTimeout = setTimeout(crawl, 600); // initial start wait
}

function derail(r, c, reason) {
  stopTrain();
  playSound('wrong');
  document.getElementById(`cell-${r}-${c}`).classList.add('error');
  speak({
    en: 'Oh no, the track is broken!',
    hi: 'अरे नहीं, ट्रैक टूट गया!',
    gu: 'અરે નહી, ટ્રેક તૂટી ગયો છે!'
  });
}

document.addEventListener('DOMContentLoaded', () => { initLanguageSelector(); initSandbox(); });
</script>
</body>
