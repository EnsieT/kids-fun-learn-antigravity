<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Memory Game 🃏 · Kids Fun Learn</title>
<link rel="stylesheet" href="../css/style.css"/>
<style>
  .difficulty-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    padding: 10px 16px 4px;
    flex-wrap: wrap;
  }
  .diff-btn {
    padding: 10px 22px;
    border-radius: 50px;
    border: 3px solid #ddd;
    background: #fff;
    font-size: 1.1rem;
    font-weight: 800;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .diff-btn:hover  { border-color: #9C27B0; }
  .diff-btn.active { border-color: #9C27B0; background: #EDE7F6; }

  .card-grid {
    display: grid;
    gap: 14px;
    padding: 12px 16px;
    justify-content: center;
    max-width: 560px;
    margin: 0 auto;
  }
  .grid-3 { grid-template-columns: repeat(3, 1fr); }
  .grid-4 { grid-template-columns: repeat(4, 1fr); }

  /* Flip card */
  .mem-card {
    aspect-ratio: 1;
    perspective: 600px;
    cursor: pointer;
    min-width: 70px;
  }
  .mem-card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transition: transform 0.55s;
    transform-style: preserve-3d;
  }
  .mem-card.flipped .mem-card-inner {
    transform: rotateY(180deg);
  }
  .mem-card-front,
  .mem-card-back {
    position: absolute;
    width: 100%; height: 100%;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    box-shadow: 0 4px 14px rgba(0,0,0,0.14);
    font-size: clamp(2rem, 7vw, 3.2rem);
  }
  .mem-card-front {
    background: linear-gradient(135deg, #9C27B0, #673AB7);
    /* Rangoli star pattern */
    color: rgba(255,255,255,0.55);
    font-size: clamp(2.4rem, 8vw, 3.8rem);
  }
  .mem-card-back {
    transform: rotateY(180deg);
    background: #fff;
    border: 4px solid transparent;
    transition: border-color 0.2s;
  }
  .mem-card.matched .mem-card-back {
    border-color: #4CAF50;
    background: #E8F5E9;
    box-shadow: 0 0 0 3px #4CAF50, 0 4px 14px rgba(76,175,80,0.3);
  }
  .mem-card.wrong-flash .mem-card-back {
    background: #FFEBEE;
    animation: shake 0.5s;
  }
  .mem-card:not(.flipped):hover .mem-card-inner { transform: rotateY(10deg); }

  .stats-row {
    display: flex;
    gap: 16px;
    justify-content: center;
    padding: 4px 16px;
    font-weight: 800;
    font-size: 1rem;
    color: #555;
    flex-wrap: wrap;
  }
  .stat-pill {
    background: #fff;
    border-radius: 50px;
    padding: 6px 18px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    display: flex;
    align-items: center;
    gap: 6px;
  }
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>

<header class="activity-header">
  <button class="back-btn" onclick="goHome()" aria-label="Go Home">🏠</button>
  <h1>🃏 Memory Game</h1>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill"></div></div>
  <span class="score-display" id="score-display">0/0</span>
</header>

<div id="game-area">
  <div class="question-area">
    <p class="question-text">जोड़ी ढूंढो! Find the pairs!</p>
    <button class="hear-btn" onclick="hearAgain()" aria-label="आवाज़ सुनो">🔊</button>
  </div>

  <!-- Difficulty -->
  <div class="difficulty-row">
    <button class="diff-btn active" onclick="setDifficulty('easy',this)">🐣 Easy (3)</button>
    <button class="diff-btn"        onclick="setDifficulty('medium',this)">🐥 Medium (6)</button>
    <button class="diff-btn"        onclick="setDifficulty('hard',this)">🐓 Hard (8)</button>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-pill">🔢 Moves: <span id="moves-count">0</span></div>
    <div class="stat-pill">✅ Pairs: <span id="pairs-count">0</span> / <span id="pairs-total">3</span></div>
    <div class="stat-pill">⏳ <span id="timer-display">0:00</span></div>
  </div>

  <div id="feedback-banner" class="feedback-banner"></div>

  <div id="card-grid" class="card-grid grid-3"></div>
</div>

<div id="completion-screen" class="completion-screen">
  <div class="completion-stars" id="completion-stars"></div>
  <div class="completion-title" id="completion-title"></div>
  <div class="completion-score" id="completion-score"></div>
  <div class="completion-best"  id="completion-best"></div>
  <button class="play-again-btn" onclick="restartGame()">🔄 Play Again</button>
</div>

<script src="../js/common.js"></script>
<script>
const EMOJI_DATA = [
  {emoji:'🥭', hi:'आम'},
  {emoji:'🥥', hi:'नारियल'},
  {emoji:'🪔', hi:'दिया'},
  {emoji:'🦚', hi:'मोर'},
  {emoji:'🐘', hi:'हाथी'},
  {emoji:'🌺', hi:'फूल'},
  {emoji:'🏏', hi:'क्रिकेट'},
  {emoji:'🪷', hi:'कमल'},
  {emoji:'🐯', hi:'बाघ'},
  {emoji:'🌸', hi:'चेरी फूल'},
  {emoji:'🎊', hi:'पटाखा'},
  {emoji:'🦜', hi:'तोता'},
];

const DIFFICULTY = {
  easy:   {pairs: 3, cols: 3, rows: 2},
  medium: {pairs: 6, cols: 4, rows: 3},
  hard:   {pairs: 8, cols: 4, rows: 4},
};

let currentDifficulty = 'easy';
let cards = [];
let flipped = [];
let matched = 0;
let moves = 0;
let canFlip = true;
let timerInterval = null;
let timerSeconds = 0;
const currentPrompt = 'जोड़ी ढूंढो!';

function hearAgain() { speakHindi(currentPrompt); }

function setDifficulty(level, btn) {
  currentDifficulty = level;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  restartGame();
}

function restartGame() {
  clearInterval(timerInterval);
  timerSeconds = 0;
  matched = 0; moves = 0; flipped = []; canFlip = true;

  document.getElementById('completion-screen').classList.remove('show');
  document.getElementById('game-area').classList.remove('hidden');
  hideFeedback();

  const cfg = DIFFICULTY[currentDifficulty];
  const pool = shuffle([...EMOJI_DATA]).slice(0, cfg.pairs);
  cards = shuffle([...pool, ...pool].map((item, i) => ({...item, id: i})));

  document.getElementById('pairs-total').textContent = cfg.pairs;
  document.getElementById('pairs-count').textContent = '0';
  document.getElementById('moves-count').textContent = '0';
  document.getElementById('timer-display').textContent = '0:00';
  updateProgress(0, cfg.pairs);

  const grid = document.getElementById('card-grid');
  grid.className = 'card-grid ' + (cfg.cols === 3 ? 'grid-3' : 'grid-4');
  grid.innerHTML = '';

  cards.forEach((card, idx) => {
    const outer = document.createElement('div');
    outer.className = 'mem-card';
    outer.dataset.idx = idx;
    outer.innerHTML = `
      <div class="mem-card-inner">
        <div class="mem-card-front">⭐</div>
        <div class="mem-card-back">${card.emoji}</div>
      </div>`;
    outer.onclick = () => handleCardClick(idx);
    grid.appendChild(outer);
  });

  // Start timer
  timerInterval = setInterval(() => {
    timerSeconds++;
    const m = Math.floor(timerSeconds / 60);
    const s = timerSeconds % 60;
    document.getElementById('timer-display').textContent =
      m + ':' + String(s).padStart(2,'0');
  }, 1000);

  speakHindi(currentPrompt);
}

function handleCardClick(idx) {
  if (!canFlip) return;
  const card = cards[idx];
  const el = document.querySelector(`.mem-card[data-idx="${idx}"]`);
  if (!el || el.classList.contains('flipped') || el.classList.contains('matched')) return;

  el.classList.add('flipped');
  speakHindi(card.hi);
  flipped.push(idx);

  if (flipped.length === 2) {
    canFlip = false;
    moves++;
    document.getElementById('moves-count').textContent = moves;
    const [a, b] = flipped;
    if (cards[a].emoji === cards[b].emoji) {
      // Match!
      matched++;
      document.getElementById('pairs-count').textContent = matched;
      const cfg = DIFFICULTY[currentDifficulty];
      updateProgress(matched, cfg.pairs);
      setTimeout(() => {
        document.querySelectorAll(`.mem-card[data-idx="${a}"], .mem-card[data-idx="${b}"]`)
          .forEach(e => e.classList.add('matched'));
        showFeedback(true);
        speakHindi('जोड़ी मिल गई!');
        flipped = [];
        canFlip = true;
        if (matched >= cfg.pairs) {
          clearInterval(timerInterval);
          setTimeout(() => finishGame(), 800);
        }
      }, 400);
    } else {
      // No match
      setTimeout(() => {
        const elA = document.querySelector(`.mem-card[data-idx="${a}"]`);
        const elB = document.querySelector(`.mem-card[data-idx="${b}"]`);
        if (elA) { elA.classList.add('wrong-flash'); }
        if (elB) { elB.classList.add('wrong-flash'); }
        setTimeout(() => {
          if (elA) { elA.classList.remove('flipped','wrong-flash'); }
          if (elB) { elB.classList.remove('flipped','wrong-flash'); }
          flipped = [];
          canFlip = true;
        }, 500);
      }, 700);
    }
  }
}

function calcMemoryStars(movesCount, pairs) {
  const maxMoves = pairs * 3;
  if (movesCount <= pairs)    return 3;
  if (movesCount <= maxMoves) return 2;
  return 1;
}

function finishGame() {
  const cfg = DIFFICULTY[currentDifficulty];
  const stars = calcMemoryStars(moves, cfg.pairs);
  saveBestScore('memory-game', stars);
  const best = getBestScore('memory-game');

  document.getElementById('game-area').classList.add('hidden');
  const cs = document.getElementById('completion-screen');
  cs.classList.add('show');

  document.getElementById('completion-stars').textContent = starsHTML(stars);
  let msg;
  if (stars === 3)      msg = '🎊 शानदार! Excellent!';
  else if (stars === 2) msg = '👏 बहुत अच्छा! Very Good!';
  else                  msg = '💪 अच्छा प्रयास! Good Try!';
  document.getElementById('completion-title').textContent = msg;
  document.getElementById('completion-score').textContent =
    `Moves: ${moves} | Time: ${document.getElementById('timer-display').textContent}`;
  document.getElementById('completion-best').textContent = 'Best: ' + starsHTML(best);
  launchConfetti();

  if (stars === 3)      speakHindi('बहुत अच्छा! तुमने तीन सितारे कमाए!');
  else if (stars === 2) speakHindi('बहुत अच्छा! तुमने दो सितारे कमाए!');
  else                  speakHindi('अच्छा प्रयास! एक सितारा!');
}

document.addEventListener('DOMContentLoaded', restartGame);
</script>
</body>
</html>
