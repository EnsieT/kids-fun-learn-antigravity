<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Make a Thali 🥗</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .thali-tabs { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; padding:8px 16px; }
    .thali-tab { background:#fff; border:3px solid #ddd; border-radius:50px; padding:8px 16px;
                 font-size:1rem; font-weight:800; cursor:pointer; font-family:inherit; }
    .thali-tab.active { border-color:#FF8C00; background:#FFF3E0; }

    .thali-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .thali-plate {
      position: relative;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #f5f5f0, #e8e8d8);
      border: 8px solid #FFD700;
      box-shadow: 0 4px 20px rgba(0,0,0,.2), inset 0 2px 8px rgba(255,255,255,.8);
      margin: 0 auto;
    }
    .katori-spot {
      position: absolute;
      width: 75px;
      height: 75px;
      border-radius: 50%;
      background: #fffaf0;
      border: 3px dashed #ccc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      transform: translate(-50%, -50%);
    }
    .katori-spot[data-pos="center"] { left: 50%; top: 50%; }
    .katori-spot[data-pos="top"]    { left: 50%; top: 18%; }
    .katori-spot[data-pos="right"]  { left: 82%; top: 50%; }
    .katori-spot[data-pos="bottom"] { left: 50%; top: 82%; }
    .katori-spot[data-pos="left"]   { left: 18%; top: 50%; }
    .katori-spot.filled { border: 3px solid #FF8C00; background: #FFF8E1; }
    .katori-spot .spot-emoji { font-size: 2rem; line-height: 1; }
    .katori-spot .spot-label { font-size: .55rem; font-weight: 800; color: #666; text-align: center; max-width: 70px; }

    .food-shelf {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      padding: 12px 16px;
      max-width: 600px;
      margin: 0 auto;
    }
    .food-btn {
      background: #fff;
      border: 3px solid #eee;
      border-radius: 16px;
      padding: 8px 10px;
      cursor: pointer;
      text-align: center;
      min-width: 70px;
      transition: transform .15s, border-color .15s;
      font-family: inherit;
    }
    .food-btn:hover { transform: scale(1.1); border-color: #FF8C00; }
    .food-btn .f-emoji { font-size: 2rem; display: block; }
    .food-btn .f-name { font-size: .72rem; font-weight: 800; color: #555; }
    .food-btn.used { opacity: .4; pointer-events: none; }

    .serve-btn {
      display: block;
      margin: 12px auto 8px;
      padding: 14px 40px;
      font-size: 1.4rem;
      font-weight: 900;
      font-family: inherit;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, #FF6B35, #FF8C00);
      color: #fff;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(255,107,53,.4);
      transition: transform .15s;
    }
    .serve-btn:hover { transform: scale(1.05); }

    .round-prompt {
      text-align: center;
      font-size: 1.1rem;
      font-weight: 800;
      color: #444;
      padding: 4px 16px 0;
    }
    .thali-type-label {
      text-align: center;
      font-size: 1.4rem;
      font-weight: 900;
      color: #FF8C00;
      padding: 4px 0;
    }
    .score-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      padding: 4px 16px;
      flex-wrap: wrap;
    }
    @media (max-width: 400px) {
      .thali-plate { width: 280px; height: 280px; }
      .katori-spot { width: 65px; height: 65px; }
      .katori-spot .spot-emoji { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
  <canvas id="confetti-canvas"></canvas>

  <header class="activity-header">
    <button class="back-btn" onclick="goHome()">🏠</button>
    <h1>🥗 Make a Thali</h1>
  </header>

  <div id="langSelector" class="language-selector">
    <button class="lang-btn" data-lang="en">🇬🇧 En</button>
    <button class="lang-btn" data-lang="hi">🇮🇳 हि</button>
    <button class="lang-btn" data-lang="gu">🇮🇳 ગુ</button>
  </div>

  <div class="progress-bar"><div id="progress-fill"></div></div>
  <div class="score-row">
    <span id="score-display"></span>
  </div>

  <div id="game-area">
    <p class="round-prompt" id="round-prompt"></p>
    <p class="thali-type-label" id="thali-type-label"></p>

    <div class="thali-wrapper">
      <div class="thali-plate" id="thali-plate">
        <div class="katori-spot" data-pos="center" data-idx="0" onclick="removeFromSpot(0)"></div>
        <div class="katori-spot" data-pos="top"    data-idx="1" onclick="removeFromSpot(1)"></div>
        <div class="katori-spot" data-pos="right"  data-idx="2" onclick="removeFromSpot(2)"></div>
        <div class="katori-spot" data-pos="bottom" data-idx="3" onclick="removeFromSpot(3)"></div>
        <div class="katori-spot" data-pos="left"   data-idx="4" onclick="removeFromSpot(4)"></div>
      </div>
    </div>

    <div class="food-shelf" id="food-shelf"></div>

    <button class="serve-btn" id="serve-btn" onclick="serveThali()">🍽️ <span id="serve-label">Serve!</span></button>
  </div>

  <div id="completion-screen" class="completion-screen hidden">
    <div class="completion-content">
      <div id="completion-stars" class="completion-stars"></div>
      <div id="completion-title" class="completion-title"></div>
      <div id="completion-score"></div>
      <div id="completion-best"></div>
      <div class="completion-buttons">
        <button onclick="restartGame()" class="btn-primary">🔄 Play Again</button>
        <button onclick="goHome()" class="btn-secondary">🏠 Home</button>
      </div>
    </div>
  </div>

  <div id="feedback-banner"></div>

  <script src="../js/common.js"></script>
  <script>
    const THALI_TYPES = [
      { key:'rajasthani', emoji:'🏜️', en:'Rajasthani', hi:'राजस्थानी', gu:'રાજસ્થાની',
        essential:['dal','sabzi','roti','pickle'] },
      { key:'punjabi',    emoji:'🌾', en:'Punjabi',     hi:'पंजाबी',    gu:'પંજાબી',
        essential:['dal','sabzi','roti','lassi'] },
      { key:'southindian',emoji:'🌴', en:'South Indian',hi:'दक्षिण भारतीय', gu:'દક્ષિણ ભારતીય',
        essential:['rice','dal','sabzi','raita'] },
      { key:'gujarati',   emoji:'🏔️', en:'Gujarati',    hi:'गुजराती',   gu:'ગુજરાતી',
        essential:['khichdi','dal','sabzi','roti'] },
    ];

    const FOODS = [
      { key:'rice',    emoji:'🍚', en:'Rice',    hi:'चावल',   gu:'ભાત' },
      { key:'roti',    emoji:'🫓', en:'Roti',    hi:'रोटी',   gu:'રોટી' },
      { key:'dal',     emoji:'🍛', en:'Dal',     hi:'दाल',    gu:'દાળ' },
      { key:'sabzi',   emoji:'🥘', en:'Sabzi',   hi:'सब्ज़ी', gu:'શાક' },
      { key:'raita',   emoji:'🥗', en:'Raita',   hi:'रायता',  gu:'રાઇતું' },
      { key:'pickle',  emoji:'🥒', en:'Pickle',  hi:'अचार',   gu:'અથાણું' },
      { key:'sweet',   emoji:'🧁', en:'Sweet',   hi:'मिठाई',  gu:'મીઠાઈ' },
      { key:'lassi',   emoji:'🥛', en:'Lassi',   hi:'लस्सी',  gu:'છાશ' },
      { key:'khichdi', emoji:'🍮', en:'Khichdi', hi:'खिचड़ी', gu:'ખીચડી' },
      { key:'paratha', emoji:'🥞', en:'Paratha', hi:'पराठा',  gu:'પરાઠા' },
    ];

    const TOTAL_ROUNDS = 8;
    const SPOTS = ['center','top','right','bottom','left'];

    let round = 0;
    let mistakes = 0;
    let currentThali = null;
    let spots = [null, null, null, null, null]; // food keys in each spot
    let validating = false;

    function getLang() { return getCurrentLanguage(); }
    function tl(obj) { return t(obj); }

    function foodByKey(key) { return FOODS.find(f => f.key === key); }

    function onLanguageChange() {
      renderPrompt();
      renderThaliLabel();
      renderShelf();
      renderServeLabel();
    }

    function renderPrompt() {
      document.getElementById('round-prompt').textContent = tl({
        en:'Make a yummy thali!',
        hi:'स्वादिष्ट थाली बनाओ!',
        gu:'સ્વાદિષ્ટ થાળી બનાવો!'
      });
    }

    function renderThaliLabel() {
      if (!currentThali) return;
      document.getElementById('thali-type-label').textContent =
        currentThali.emoji + ' ' + tl(currentThali) + ' Thali';
    }

    function renderServeLabel() {
      document.getElementById('serve-label').textContent = tl({en:'Serve!',hi:'परोसो!',gu:'પીરસો!'});
    }

    function renderShelf() {
      const shelf = document.getElementById('food-shelf');
      const lang = getLang();
      const usedKeys = new Set(spots.filter(Boolean));
      shelf.innerHTML = '';
      FOODS.forEach(food => {
        const btn = document.createElement('button');
        btn.className = 'food-btn' + (usedKeys.has(food.key) ? ' used' : '');
        btn.innerHTML = `<span class="f-emoji">${food.emoji}</span><span class="f-name">${food[lang]}</span>`;
        btn.onclick = () => tapFood(food.key);
        shelf.appendChild(btn);
      });
    }

    function renderSpots() {
      const lang = getLang();
      SPOTS.forEach((pos, idx) => {
        const el = document.querySelector(`.katori-spot[data-pos="${pos}"]`);
        const key = spots[idx];
        if (key) {
          const food = foodByKey(key);
          el.classList.add('filled');
          el.innerHTML = `<span class="spot-emoji">${food.emoji}</span><span class="spot-label">${food[lang]}</span>`;
        } else {
          el.classList.remove('filled');
          el.innerHTML = '';
        }
      });
    }

    function tapFood(key) {
      if (validating) return;
      const food = foodByKey(key);
      speak(food);

      // If already on plate, do nothing extra
      if (spots.includes(key)) return;

      // Find first empty spot
      const emptyIdx = spots.findIndex(s => s === null);
      if (emptyIdx === -1) {
        // Thali full
        showFeedback(false);
        speak({en:'Thali is full!', hi:'थाली भरी है!', gu:'થાળી ભરેલી છે!'});
        setTimeout(hideFeedback, 1500);
        return;
      }
      spots[emptyIdx] = key;
      renderSpots();
      renderShelf();
    }

    function removeFromSpot(idx) {
      if (validating) return;
      if (!spots[idx]) return;
      spots[idx] = null;
      renderSpots();
      renderShelf();
    }

    function serveThali() {
      if (validating) return;
      validating = true;

      const lang = getLang();
      const essential = currentThali.essential;
      const placedKeys = spots.filter(Boolean);
      const matched = essential.filter(k => placedKeys.includes(k));
      const missing = essential.filter(k => !placedKeys.includes(k));

      if (matched.length >= 3) {
        showFeedback(true);
        speak({en:'Delicious! What a yummy thali!', hi:'वाह! कितनी स्वादिष्ट थाली!', gu:'વાહ! કેટલી સ્વાદિષ્ટ થાળી!'});
        launchConfetti();
      } else if (matched.length >= 1) {
        mistakes++;
        const missingFood = foodByKey(missing[0]);
        showFeedback(false);
        speak({
          en:`Maybe add some ${missingFood.en}?`,
          hi:`शायद ${missingFood.hi} डालें?`,
          gu:`કદાચ ${missingFood.gu} ઉમેરો?`
        });
      } else {
        mistakes++;
        const firstFood = foodByKey(essential[0]);
        showFeedback(false);
        speak({
          en:`This thali needs some ${firstFood.en}!`,
          hi:`इस थाली में ${firstFood.hi} चाहिए!`,
          gu:`આ થાળીમાં ${firstFood.gu} જોઈએ!`
        });
      }

      setTimeout(() => {
        hideFeedback();
        round++;
        updateProgress(round, TOTAL_ROUNDS);
        document.getElementById('score-display').textContent =
          tl({en:`Round ${round}/${TOTAL_ROUNDS}`, hi:`चक्र ${round}/${TOTAL_ROUNDS}`, gu:`રાઉન્ડ ${round}/${TOTAL_ROUNDS}`});

        if (round >= TOTAL_ROUNDS) {
          showCompletion('thali', mistakes, TOTAL_ROUNDS);
        } else {
          startRound();
        }
        validating = false;
      }, 1800);
    }

    function startRound() {
      currentThali = pickRandom(THALI_TYPES);
      spots = [null, null, null, null, null];
      renderThaliLabel();
      renderSpots();
      renderShelf();
      updateProgress(round, TOTAL_ROUNDS);
      document.getElementById('score-display').textContent =
        tl({en:`Round ${round + 1}/${TOTAL_ROUNDS}`, hi:`चक्र ${round + 1}/${TOTAL_ROUNDS}`, gu:`રાઉન્ડ ${round + 1}/${TOTAL_ROUNDS}`});
    }

    function restartGame() {
      round = 0;
      mistakes = 0;
      validating = false;
      document.getElementById('completion-screen').classList.add('hidden');
      document.getElementById('game-area').style.display = '';
      startRound();
    }

    document.addEventListener('DOMContentLoaded', () => {
      initLanguageSelector();
      renderPrompt();
      renderServeLabel();
      startRound();
      updateProgress(0, TOTAL_ROUNDS);
      document.getElementById('score-display').textContent =
        tl({en:`Round 1/${TOTAL_ROUNDS}`, hi:`चक्र 1/${TOTAL_ROUNDS}`, gu:`રાઉન્ડ 1/${TOTAL_ROUNDS}`});
    });
  </script>
</body>
</html>
